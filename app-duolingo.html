<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>Daana — Duolingo English Test Practice · by Arian Academy</title>
<style>
:root{--ink:#28323b;--mut:#6b7785;--line:#dfe3e7;--teal:#1a8f93;--teald:#157074;--green:#16a06a;--greend:#0f8456;--panel:#f5f7f8;--det:#58cc02;--detd:#46a302;--red:#c0392b}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:#fff;line-height:1.5}
button{font-family:inherit;cursor:pointer}.hidden{display:none!important}
.center-wrap{max-width:760px;margin:0 auto;padding:34px 20px 70px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800}
.mk{width:30px;height:30px;border:1.5px solid var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--teal);font-weight:800}
.h1{font-size:27px;font-weight:800;margin:.3em 0}.lead{color:var(--mut);font-size:15px}
.btn{background:var(--det);color:#fff;border:none;border-radius:14px;padding:12px 26px;font-weight:800;font-size:15px;box-shadow:0 3px 0 var(--detd)}
.btn:hover{filter:brightness(1.03)}.btn:active{transform:translateY(2px);box-shadow:none}
.btn.teal{background:var(--teal);box-shadow:0 3px 0 var(--teald)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:10px;box-shadow:none;font-weight:700}
.btn:disabled{opacity:.5;box-shadow:none}
.dir-card{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:18px}
.dir-head{background:var(--det);color:#fff;font-weight:800;padding:14px 20px}.dir-body{padding:20px}
#test{display:none;flex-direction:column;min-height:100vh}#test.on{display:flex}
.thead{max-width:820px;margin:0 auto;width:100%;padding:16px 22px 4px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.thead .sec{font-size:15px;font-weight:800;color:var(--mut)}
.clock{display:flex;align-items:center;gap:6px;font-weight:800;color:var(--teal)}
.progress{height:8px;background:#e3e7ea;border-radius:6px;margin:6px 22px}.progress>i{display:block;height:100%;background:var(--det);border-radius:6px;transition:width .25s}
.tbody{flex:1;max-width:820px;margin:0 auto;width:100%;padding:22px;}
.tasktype{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--det);font-weight:800;margin-bottom:4px}
.instr{font-weight:700;font-size:16px;margin-bottom:14px}
.wbgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.wbtn{padding:14px;border:2px solid var(--line);border-radius:12px;background:#fff;font-size:16px;font-weight:700;text-align:center}
.wbtn.sel{border-color:var(--det);background:#eefce3;color:var(--detd)}
.rcbox{font-size:17px;line-height:2.4;color:#33424d;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
.rcblank{display:inline-flex;align-items:center}.rcblank .pre{font-weight:700}
.rcblank input{width:5em;border:none;border-bottom:2px solid var(--det);background:#fff;font-size:16px;padding:2px 4px;outline:none;font-family:inherit}
.player{display:flex;flex-direction:column;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:14px}
.playbtn{width:64px;height:64px;border-radius:50%;background:var(--teal);color:#fff;border:none;font-size:26px;box-shadow:0 3px 0 var(--teald)}
.ta{width:100%;min-height:120px;border:1px solid var(--line);border-radius:10px;padding:12px;font-family:inherit;font-size:15px;outline:none}
.ta:focus{border-color:var(--det)}
.scene{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:12px;text-align:center;background:#eaf6ff}
.passage{font-size:15px;color:#33424d;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;max-height:42vh;overflow:auto;margin-bottom:12px}
.passage p{margin:0 0 10px}
.mcq{margin:0 0 14px}.mcq .qt{font-weight:600;margin-bottom:7px}
.opt{display:flex;gap:10px;align-items:flex-start;padding:9px 8px;border:1.5px solid var(--line);border-radius:10px;cursor:pointer;margin-bottom:7px}.opt.sel{border-color:var(--det);background:#eefce3}
.bigtimer{font-size:40px;font-weight:800;color:var(--teal);text-align:center;font-variant-numeric:tabular-nums}
.navbar{background:#f0f2f4;border-top:1px solid var(--line)}.navin{max-width:820px;margin:0 auto;display:flex;justify-content:flex-end;padding:14px 22px}
.scoregrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}
.scell{background:var(--panel);border-radius:12px;padding:16px;text-align:center}.scell .n{font-size:30px;font-weight:800;color:var(--teal)}
.bigscore{font-size:64px;font-weight:800;color:var(--det);text-align:center;line-height:1}
.wc{font-weight:700;color:var(--mut);font-size:13px}
.statusbar{padding:10px 14px;border-radius:8px;font-weight:700;margin-bottom:12px}
.st-ok{background:#dff3e6;color:#1a7a4f}.st-bad{background:#fbe3e3;color:#a32d2d}.st-none{background:#f3e6c6;color:#7a5b16}
.expcard{border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-top:8px}.expcard .h{font-weight:800;color:var(--teal);margin-bottom:6px}
@media(max-width:640px){.center-wrap,.tbody{padding:18px 14px}.scoregrid{grid-template-columns:1fr}.wbgrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="home"></div>
<div id="test"></div>
<script>
/* ========= DET content (original practice items) ========= */
const SCENE_PARK="<svg width='100%' viewBox='0 0 400 200' style='max-width:420px' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='200' fill='#bfe8ff'/><rect y='140' width='400' height='60' fill='#9fdc7a'/><circle cx='340' cy='45' r='26' fill='#ffd84d'/><rect x='70' y='95' width='12' height='55' fill='#8a5a2b'/><circle cx='76' cy='85' r='34' fill='#4caf50'/><rect x='150' y='150' width='90' height='10' rx='3' fill='#8a5a2b'/><rect x='158' y='160' width='8' height='18' fill='#8a5a2b'/><rect x='224' y='160' width='8' height='18' fill='#8a5a2b'/><circle cx='290' cy='130' r='9' fill='#e8a06b'/><rect x='284' y='139' width='12' height='26' rx='4' fill='#d9534f'/></svg>";
const SCENE_KITCHEN="<svg width='100%' viewBox='0 0 400 200' style='max-width:420px' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='200' fill='#fdf3e0'/><rect y='150' width='400' height='50' fill='#caa472'/><rect x='40' y='110' width='140' height='40' fill='#e9ddc7' stroke='#caa472'/><circle cx='75' cy='100' r='10' fill='#d9534f'/><circle cx='100' cy='100' r='10' fill='#f0ad4e'/><circle cx='125' cy='100' r='10' fill='#5cb85c'/><rect x='250' y='70' width='90' height='80' fill='#dfe6ea' stroke='#9aa6ad'/><rect x='258' y='80' width='74' height='30' fill='#bcd3e0'/><circle cx='295' cy='130' r='6' fill='#6b7785'/></svg>";

const DET = { name:"Duolingo English Test", tasks:[
 { type:"wordbank", minutes:1, instr:"Select the REAL English words. Tap a word to select it; tap again to unselect.",
   words:[{w:"garden",real:true},{w:"flomp",real:false},{w:"honest",real:true},{w:"snark",real:false},{w:"deliver",real:true},{w:"gondle",real:false},{w:"cushion",real:true},{w:"plimber",real:false},{w:"glacier",real:true},{w:"queltz",real:false},{w:"prudent",real:true},{w:"tovish",real:false},{w:"observe",real:true},{w:"brindle",real:false}] },
 { type:"readcomplete", minutes:3, instr:"Type the missing letters to complete the text.",
   parts:[{t:"The city museum "},{pre:"op",ans:"ens"},{t:" at nine in the morning and "},{pre:"clo",ans:"ses"},{t:" at five. "},{pre:"Visit",ans:"ors"},{t:" can buy "},{pre:"tick",ans:"ets"},{t:" at the desk or "},{pre:"onl",ans:"ine"},{t:". Children under six "},{pre:"en",ans:"ter"},{t:" for free."}] },
 { type:"dictation", minutes:1, instr:"Listen and type the sentence you hear. You can replay it once.",
   audio:"Most students prefer to study in the morning when the library is quiet.", answer:"Most students prefer to study in the morning when the library is quiet." },
 { type:"dictation", minutes:1, instr:"Listen and type the sentence you hear. You can replay it once.",
   audio:"The train to the airport leaves every twenty minutes from platform four.", answer:"The train to the airport leaves every twenty minutes from platform four." },
 { type:"ireading", minutes:5, instr:"Read the passage and answer the questions.",
   passage:{ title:"Working from Home", paras:[
     "When the option to work from home first appeared, many managers feared that staff would be less productive without an office to keep them focused. In practice, research has often found the opposite. Freed from long commutes and constant interruptions, many employees report getting more done in less time.",
     "Yet remote work is not perfect. Some people struggle to separate their job from their home life, answering emails late into the night. Others miss the friendships and quick conversations that an office naturally provides. The most successful companies, experts say, are those that mix the two, allowing staff to choose the balance that suits them." ] },
   questions:[
     {id:"r1", q:"What did some managers worry about at first?", opts:["that staff would work too many hours","that staff would be less productive","that offices would close"], ans:1},
     {id:"r2", q:"According to the passage, one benefit of remote work is", opts:["avoiding long commutes","earning more money","working fewer days"], ans:0},
     {id:"r3", q:"One problem mentioned with remote work is", opts:["slower internet","difficulty separating work and home life","higher costs"], ans:1},
     {id:"r4", q:"Experts suggest the best approach is to", opts:["return fully to the office","ban emails at night","mix office and home work"], ans:2} ] },
 { type:"writephoto", minutes:1, instr:"Write one or more sentences that describe the image.", image:SCENE_PARK,
   guide:["Describe what you see (people, place, objects)","Use complete sentences","Aim for accurate grammar and useful vocabulary"] },
 { type:"readwrite", minutes:5, instr:"Write at least 50 words on the topic below.",
   prompt:"Some people enjoy living in a big city, while others prefer a small town. Which do you prefer, and why?",
   guide:["State your preference clearly","Give at least two reasons with examples","Organise your ideas; check grammar and spelling"] },
 { type:"readaloud", minutes:1, instr:"Read the sentence aloud clearly. (Speaking - self-review.)",
   text:"The committee will announce its final decision after reviewing all of the applications.",
   guide:["Speak clearly at a natural pace","Pronounce each word fully","Use natural sentence stress and intonation"] },
 { type:"speakphoto", minutes:2, instr:"Speak about the image for up to 90 seconds. (Speaking - self-review.)", image:SCENE_KITCHEN,
   guide:["Describe the scene in detail","Say what is happening and where","Keep speaking for the full time; develop your ideas"] }
]};

/* ========= state ========= */
let tasks=[], ti=0, ans={}, timerInt=null, taskTimer=0, mode="home", startedAt=0, replayed={};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt=s=>{const m=Math.floor(s/60),x=s%60;return m+":"+String(x).padStart(2,"0");};
const round5=x=>Math.max(10,Math.min(160,Math.round(x/5)*5));
function homeEl(){return document.getElementById("home");}
function testEl(){return document.getElementById("test");}
function det(text){ if("speechSynthesis"in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=0.95;u.lang="en-US";window.speechSynthesis.speak(u);} }
const TYPELABEL={wordbank:"Read and Select",readcomplete:"Read and Complete",dictation:"Listen and Type",ireading:"Interactive Reading",writephoto:"Write About the Photo",readwrite:"Read, Then Write",readaloud:"Read Aloud",speakphoto:"Speak About the Photo"};

/* ========= home ========= */
function showHome(){ if(timerInt)clearInterval(timerInt); if(window.speechSynthesis)speechSynthesis.cancel(); mode="home";
 testEl().classList.remove("on"); testEl().innerHTML=""; homeEl().style.display="block";
 homeEl().innerHTML=`<div class="center-wrap"><div class="brand"><span class="mk">D</span><span>Daana</span></div>
   <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.6;margin-top:4px">Duolingo English Test · practice · by Arian Academy</div>
   <h1 class="h1" style="margin-top:12px">Duolingo English Test — Practice</h1>
   <p class="lead">A short adaptive-style practice across the main DET question types. Scored on the 10–160 scale with four subscores (Literacy, Comprehension, Conversation, Production). Reading &amp; Listening tasks are auto-scored; Writing &amp; Speaking use guided self-review. Original practice material.</p>
   <div style="margin-top:14px"><button class="btn" onclick="begin()">Start Practice (${DET.tasks.length} tasks)</button></div>
   <p class="lead" style="margin-top:18px">Question types included: ${[...new Set(DET.tasks.map(t=>TYPELABEL[t.type]))].join(" · ")}</p></div>`;
}
function begin(){ tasks=DET.tasks; ti=0; ans={}; replayed={}; startedAt=Date.now(); render(); }

/* ========= per-task timer ========= */
function startTaskTimer(secs){ if(timerInt)clearInterval(timerInt); taskTimer=secs; paintClock();
 timerInt=setInterval(()=>{ taskTimer--; paintClock(); if(taskTimer<=0){clearInterval(timerInt); next();} },1000); }
function paintClock(){ const c=document.getElementById("clk"); if(c)c.textContent=fmt(Math.max(0,taskTimer)); }

/* ========= render ========= */
function render(){ window.scrollTo(0,0); mode="run"; const t=tasks[ti]; testEl().classList.add("on"); homeEl().style.display="none";
 const isLast=ti===tasks.length-1;
 testEl().innerHTML=`<div class="thead"><div class="sec">Task ${ti+1} of ${tasks.length}</div><div class="clock">&#9201; <span id="clk">--</span></div></div>
   <div class="progress"><i style="width:${Math.round((ti+1)/tasks.length*100)}%"></i></div>
   <div class="tbody"><div class="tasktype">${TYPELABEL[t.type]||""}</div><div class="instr">${esc(t.instr)}</div>${bodyFor(t)}</div>
   <div class="navbar"><div class="navin"><button class="btn" onclick="next()">${isLast?"Finish":"Next"}</button></div></div>`;
 afterRender(t);
 startTaskTimer((t.minutes||1)*60);
}
function bodyFor(t){
 if(t.type==="wordbank") return `<div class="wbgrid">${t.words.map((w,i)=>`<div class="wbtn ${(ans.wb||[]).includes(i)?'sel':''}" id="wb${i}" onclick="wbToggle(${i})">${esc(w.w)}</div>`).join("")}</div>`;
 if(t.type==="readcomplete"){ let bi=0; return `<div class="rcbox">${t.parts.map(p=>{ if(p.ans!=null){const id="rc"+(bi++);return `<span class="rcblank"><span class="pre">${esc(p.pre)}</span><input id="${id}" oninput="ans['${id}']=this.value" value="${ans['rc'+(bi-1)]?esc(ans['rc'+(bi-1)]):''}"></span>`;} return esc(p.t); }).join("")}</div>`; }
 if(t.type==="dictation") return `<div class="player"><button class="playbtn" onclick="dictPlay(${ti})">&#9654;</button><div class="lead" id="dstate">Tap play to listen (once + one replay)</div></div><textarea class="ta" id="dbox" placeholder="Type what you hear..." oninput="ans['d${ti}']=this.value">${ans['d'+ti]?esc(ans['d'+ti]):''}</textarea>`;
 if(t.type==="ireading") return `<div class="passage"><b>${esc(t.passage.title)}</b>${t.passage.paras.map(p=>`<p>${esc(p)}</p>`).join("")}</div>${t.questions.map(q=>mcqHTML(q)).join("")}`;
 if(t.type==="writephoto"||t.type==="speakphoto"){ const img=`<div class="scene">${t.image}</div>`; if(t.type==="speakphoto") return `${img}<div style="text-align:center"><div class="bigtimer" id="sclk">--</div><button class="btn teal" id="sbtn" onclick="speakRun(${(t.minutes||1)*60})">Start speaking</button></div>${guideHTML(t.guide)}<textarea class="ta" placeholder="Notes (not scored)..." style="margin-top:12px"></textarea>`;
   return `${img}<textarea class="ta" id="wbox" placeholder="Write about the image..." oninput="ans['w${ti}']=this.value;wcount()">${ans['w'+ti]?esc(ans['w'+ti]):''}</textarea><div class="wc" id="wc">0 words</div>${guideHTML(t.guide)}`; }
 if(t.type==="readwrite") return `<div class="passage"><b>Topic</b><p>${esc(t.prompt)}</p></div><textarea class="ta" id="wbox" placeholder="Write your response (50+ words)..." oninput="ans['w${ti}']=this.value;wcount()">${ans['w'+ti]?esc(ans['w'+ti]):''}</textarea><div class="wc" id="wc">0 words</div>${guideHTML(t.guide)}`;
 if(t.type==="readaloud") return `<div class="rcbox" style="line-height:1.7;font-weight:600">${esc(t.text)}</div><div style="text-align:center;margin-top:12px"><div class="bigtimer" id="sclk">--</div><button class="btn teal" id="sbtn" onclick="speakRun(${(t.minutes||1)*60})">Start reading aloud</button></div>${guideHTML(t.guide)}`;
 return "";
}
function guideHTML(g){ return g?`<div class="expcard"><div class="h">What a strong answer includes</div><ul style="margin:0;padding-left:18px">${g.map(x=>`<li style="margin-bottom:5px">${esc(x)}</li>`).join("")}</ul></div>`:""; }
function mcqHTML(q){ return `<div class="mcq"><div class="qt">${esc(q.q)}</div>${q.opts.map((o,j)=>`<label class="opt ${ans[q.id]===j?'sel':''}" id="op${q.id}_${j}" onclick="pickMcq('${q.id}',${j})">${String.fromCharCode(65+j)}. ${esc(o)}</label>`).join("")}</div>`; }
function afterRender(t){ if(t.type==="writephoto"||t.type==="readwrite") setTimeout(wcount,40); }
function wbToggle(i){ ans.wb=ans.wb||[]; const k=ans.wb.indexOf(i); if(k>=0)ans.wb.splice(k,1); else ans.wb.push(i); document.getElementById("wb"+i).classList.toggle("sel"); }
function pickMcq(id,j){ ans[id]=j; const t=tasks[ti]; const q=t.questions.find(x=>x.id===id); q.opts.forEach((o,k)=>{const e=document.getElementById("op"+id+"_"+k); if(e)e.classList.toggle("sel",k===j);}); }
function wcount(){ const b=document.getElementById("wbox"); if(!b)return; const n=b.value.trim().split(/\s+/).filter(Boolean).length; const o=document.getElementById("wc"); if(o)o.textContent=n+" words"; }
function dictPlay(idx){ const t=tasks[idx]; replayed[idx]=(replayed[idx]||0); if(replayed[idx]>=2){const s=document.getElementById("dstate");if(s)s.textContent="No more replays";return;} replayed[idx]++; det(t.audio); const s=document.getElementById("dstate"); if(s)s.textContent=replayed[idx]>=2?"Playing (last replay)":"Playing..."; }
function speakRun(secs){ const btn=document.getElementById("sbtn"),clk=document.getElementById("sclk"); btn.disabled=true; let left=secs; clk.textContent=fmt(left); const iv=setInterval(()=>{left--;clk.textContent=fmt(Math.max(0,left)); if(left<=0){clearInterval(iv);btn.textContent="Done";btn.disabled=false;}},1000); }

/* ========= nav (forward only) ========= */
function next(){ if(window.speechSynthesis)speechSynthesis.cancel(); if(ti<tasks.length-1){ti++;render();} else results(); }

/* ========= scoring 10-160 ========= */
function norm(v){ return (v||"").trim().toLowerCase().replace(/[.,!?;:'"]/g,"").replace(/\s+/g," "); }
function taskScore(t,idx){
 if(t.type==="wordbank"){ const sel=ans.wb||[]; let ok=0; t.words.forEach((w,i)=>{ if(sel.includes(i)===w.real)ok++; }); return ok/t.words.length; }
 if(t.type==="readcomplete"){ let bi=0,ok=0,tot=0; t.parts.forEach(p=>{ if(p.ans!=null){tot++; if(norm(ans["rc"+bi])===norm(p.ans))ok++; bi++;} }); return tot?ok/tot:0; }
 if(t.type==="dictation"){ const tgt=norm(t.answer).split(" "); const got=norm(ans["d"+idx]).split(" "); const g=new Set(got); let m=0; tgt.forEach(w=>{if(g.has(w))m++;}); return tgt.length?m/tgt.length:0; }
 if(t.type==="ireading"){ let ok=0; t.questions.forEach(q=>{if(ans[q.id]===q.ans)ok++;}); return t.questions.length?ok/t.questions.length:0; }
 return null; // productive = self-review
}
function results(){ if(window.speechSynthesis)speechSynthesis.cancel(); mode="result";
 const cat={literacy:[],comprehension:[],conversation:[],production:[]};
 const map={wordbank:["literacy","comprehension"],readcomplete:["literacy"],dictation:["comprehension","conversation"],ireading:["comprehension","literacy"]};
 let all=[];
 tasks.forEach((t,idx)=>{ const sc=taskScore(t,idx); if(sc!=null){ all.push(sc); (map[t.type]||[]).forEach(c=>cat[c].push(sc)); } });
 const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
 const toScore=p=>p==null?null:round5(10+p*150);
 const overall=toScore(avg(all));
 const sub={Literacy:toScore(avg(cat.literacy)),Comprehension:toScore(avg(cat.comprehension)),Conversation:toScore(avg(cat.conversation)),Production:null};
 let cells=Object.keys(sub).map(k=>`<div class="scell"><div class="lead">${k}</div><div class="n">${sub[k]!=null?sub[k]:"&mdash;"}</div><div class="lead" style="font-size:11px;margin-top:3px">${sub[k]!=null?"auto-estimated":"needs speaking/writing review"}</div></div>`).join("");
 testEl().innerHTML=`<div class="center-wrap"><div class="brand"><span class="mk">A</span><span>Arian Academy</span></div>
   <h1 class="h1" style="margin-top:14px">Your practice result</h1>
   <div class="bigscore">${overall!=null?overall:"&mdash;"}<span style="font-size:22px;color:#6b7785"> / 160</span></div>
   <p class="lead" style="text-align:center">estimated overall (auto-scored tasks)</p>
   <div class="scoregrid">${cells}</div>
   <p class="lead" style="margin-top:14px">This estimate is based on the auto-scored Reading &amp; Listening tasks. Speaking &amp; Writing (Production) need a teacher to rate - use the review to self-assess. The real DET is adaptive, so live scores will differ.</p>
   <div style="text-align:center;margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="btn teal" onclick="startReview()">Review answers</button><button class="btn" onclick="begin()">Retake</button><button class="btn ghost" onclick="showHome()">Home</button></div></div>`;
}

/* ========= review ========= */
let rItems=[],rIdx=0;
function startReview(){ rItems=[]; tasks.forEach((t,idx)=>{
   if(t.type==="wordbank"){ const sel=ans.wb||[]; let ok=0; t.words.forEach((w,i)=>{if(sel.includes(i)===w.real)ok++;}); rItems.push({title:"Read and Select",kind:"info",ok:ok+"/"+t.words.length,detail:"Real words: "+t.words.filter(w=>w.real).map(w=>w.w).join(", ")}); }
   else if(t.type==="readcomplete"){ let bi=0,rows=[]; t.parts.forEach(p=>{ if(p.ans!=null){const your=ans["rc"+bi]||""; const good=norm(your)===norm(p.ans); rows.push((p.pre+p.ans)+" - you wrote: "+(your||"(blank)")+(good?" ✓":" ✗")); bi++;} }); rItems.push({title:"Read and Complete",kind:"list",rows}); }
   else if(t.type==="dictation"){ rItems.push({title:"Listen and Type",kind:"text",your:ans["d"+idx]||"(blank)",correct:t.answer}); }
   else if(t.type==="ireading"){ t.questions.forEach(q=>rItems.push({title:"Interactive Reading",kind:"mcq",q,your:ans[q.id]})); }
   else { rItems.push({title:TYPELABEL[t.type],kind:"open",prompt:t.prompt||t.text||"(image task)",resp:ans["w"+idx],guide:t.guide}); }
 }); rIdx=0; renderReview(); }
function renderReview(){ window.scrollTo(0,0); mode="review"; const it=rItems[rIdx]; let body="";
 if(it.kind==="mcq"){ const st=it.your==null?'<div class="statusbar st-none">Not answered</div>':(it.your===it.q.ans?'<div class="statusbar st-ok">Correct</div>':'<div class="statusbar st-bad">Incorrect</div>'); body=st+`<div class="expcard"><p style="font-weight:600">${esc(it.q.q)}</p>${it.q.opts.map((o,j)=>`<div class="opt ${j===it.q.ans?'sel':''}">${String.fromCharCode(65+j)}. ${esc(o)} ${j===it.q.ans?'&#10003;':''}</div>`).join("")}</div>`; }
 else if(it.kind==="text"){ body=`<div class="expcard"><div class="h">Your answer</div><p>${esc(it.your)}</p><div class="h">Correct</div><p>${esc(it.correct)}</p></div>`; }
 else if(it.kind==="list"){ body=`<div class="expcard"><div class="h">Answers</div>${it.rows.map(r=>`<p>${esc(r)}</p>`).join("")}</div>`; }
 else if(it.kind==="info"){ body=`<div class="statusbar st-none">Score: ${it.ok}</div><div class="expcard"><p>${esc(it.detail)}</p></div>`; }
 else { body=`<div class="statusbar st-none">Open response - self-assess</div><div class="expcard"><div class="h">Task</div><p style="white-space:pre-line">${esc(it.prompt)}</p>${it.resp?`<div class="h">Your response</div><p style="white-space:pre-wrap">${esc(it.resp)}</p>`:""}<div class="h">What a strong answer includes</div><ul style="margin:0;padding-left:18px">${(it.guide||[]).map(g=>`<li>${esc(g)}</li>`).join("")}</ul></div>`; }
 testEl().innerHTML=`<div class="center-wrap"><div class="brand"><span class="mk">A</span><span>Arian Academy</span></div><h1 class="h1" style="margin-top:12px">Review — ${rIdx+1} / ${rItems.length}</h1><div class="tasktype">${esc(it.title)}</div>${body}<div style="text-align:center;margin-top:18px;display:flex;gap:10px;justify-content:center"><button class="btn ghost" onclick="rNav(-1)" ${rIdx===0?"disabled":""}>Previous</button><button class="btn teal" onclick="rNav(1)">${rIdx===rItems.length-1?"Finish":"Next"}</button><button class="btn ghost" onclick="results()">Back to score</button></div></div>`;
}
function rNav(d){ if(d>0&&rIdx===rItems.length-1){results();return;} rIdx=Math.max(0,Math.min(rItems.length-1,rIdx+d)); renderReview(); }

showHome();
</script>
</body>
