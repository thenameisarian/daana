<style>

 { key:"rla", name:"Reasoning Through Language Arts", short:"RLA", minutes:60, desc:"Reading comprehension, language editing, and an extended-response essay.",

function gedScore(pct){ return Math.max(100,Math.min(200,Math.round(100+pct*100))); }
function gedBand(score){ if(score>=175)return["College Ready + Credit","#0a7d3a"]; if(score>=165)return["College Ready","#0a66c2"]; if(score>=145)return["Passed (high school equivalency)","#1a8f93"]; return["Not yet passing","#c0392b"]; }

 homeEl().innerHTML=`<div class="center-wrap"><div class="brand"><span class="mk">D</span><span>Daana</span></div>
   <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.6;margin-top:4px">GED® practice · by Arian Academy</div>
   <h1 class="h1" style="margin-top:12px">GED — Practice by Subject</h1>
   <p class="lead">Four subjects, each scored 100–200 (a score of 145 passes; 165+ is College Ready, 175+ earns college credit). Reading, language, math, science and social-studies items are auto-scored; the essay and short answers use guided self-review. Original practice material.</p>
   <div class="cards">${GED.subjects.map(s=>`<div class="scard"><div class="nm">${esc(s.name)}</div><div class="mt">${s.minutes} min · ${esc(s.desc)}</div><button class="btn" onclick="begin('${s.key}')">Start ${esc(s.short)}</button></div>`).join("")}</div></div>`;
}
function begin(key){ subj=GED.subjects.find(x=>x.key===key); parts=subj.parts; pi=0; ans={}; startedAt=Date.now(); homeEl().style.display="none"; testEl().classList.add("on");
 testEl().innerHTML=`<div class="center-wrap"><div class="dir-card"><div class="dir-head">${esc(subj.name)} — Directions</div><div class="dir-body"><p>${esc(subj.desc)} You have about ${subj.minutes} minutes. You can move between questions with Next and Previous, and use the number palette to jump.</p></div></div><div style="text-align:center;margin-top:20px"><button class="btn teal" onclick="runSubject()">Start ${esc(subj.short)}</button></div></div>`;
}
function runSubject(){ pi=0; secTimer=subj.minutes*60; startTimer(); render(); }
function startTimer(){ if(timerInt)clearInterval(timerInt); timerInt=setInterval(()=>{secTimer--; const t=document.getElementById("clk"); if(t)t.textContent=fmt(Math.max(0,secTimer)); if(secTimer<=0){clearInterval(timerInt);finish();}},1000); }

/* ===== render ===== */
function render(){ window.scrollTo(0,0); mode="run"; const part=parts[pi]; const qs=sQuestions(subj);
 const stim = part.stimulus?`<div class="stim"><div class="stim-title">${esc(part.stimulus.title)}</div>${part.stimulus.paras.map(p=>`<p>${esc(p)}</p>`).join("")}</div>`:"";
 const ref = part.ref?`<div class="ref">${part.ref}</div>`:"";
 const groupsHTML = part.groups.map(g=>renderGroup(g)).join("");
 const right = `<div class="qcol">${ref}${groupsHTML}</div>`;
 const body = part.stimulus?`<div class="split">${stim}${right}</div>`:`${ref}${groupsHTML}`;
 const isLast=pi===parts.length-1;
 testEl().innerHTML=`<div class="thead"><div class="sec">${esc(subj.name)} · part ${pi+1} of ${parts.length}</div><div class="clock">&#9201; <span id="clk">${fmt(Math.max(0,secTimer))}</span></div></div>
   <div class="progress"><i style="width:${Math.round((pi+1)/parts.length*100)}%"></i></div>
   <div class="tbody">${body}</div>
   ${subj.key==="math"?calcHTML():""}
   <div class="navbar"><div class="navin"><div class="palette">${qs.map(q=>`<div class="pcell ${q.pidx===pi?'cur':''} ${(ans[q.id]!=null&&ans[q.id]!=='')?'done':''}" onclick="jump(${q.pidx})">${q.id.replace(/[a-z]+\d*_?/,'')||'•'}</div>`).join("")}</div><div style="display:flex;gap:8px"><button class="btn prev" onclick="prev()" ${pi===0?"disabled":""}>Previous</button><button class="btn ${isLast?'teal':''}" onclick="nextp()">${isLast?"Submit":"Next"}</button></div></div></div>`;
 afterRender(part);
}
function renderGroup(g){ const instr=`<div class="qinstr">${esc(g.instr)}</div>`;
 if(g.type==="mcq") return `<div>${instr}${g.questions.map(mcqHTML).join("")}</div>`;
 if(g.type==="fillin") return `<div>${instr}${g.questions.map(q=>`<div class="fillq"><div class="qt"><span class="qnum">${q.id.replace(/\D/g,'')}</span>${esc(q.q)}</div><input class="fillin" id="${q.id}" value="${ans[q.id]?esc(ans[q.id]):''}" oninput="ans['${q.id}']=this.value"></div>`).join("")}</div>`;
 if(g.type==="edit"){ let bi=0; return `<div>${instr}<div class="editbox">${g.parts.map(p=>{ if(p.sel){const id="ed"+pi+"_"+(bi++);return `<select class="msel" onchange="ans['${id}']=this.value"><option value="">—</option>${p.sel.map((o,j)=>`<option value="${j}" ${ans[id]==String(j)?'selected':''}>${esc(o)}</option>`).join("")}</select>`;} return esc(p.t); }).join("")}</div></div>`; }
 if(g.type==="extended") return `<div>${instr}<textarea class="ta" id="ext${pi}" placeholder="Write your response here..." oninput="ans['ext${pi}']=this.value;wcount()">${ans['ext'+pi]?esc(ans['ext'+pi]):''}</textarea><div class="wc" id="wc">0 words</div><div class="expcard"><div class="h">What a strong response includes</div><ul style="margin:0;padding-left:18px">${(g.guide||[]).map(x=>`<li style="margin-bottom:5px">${esc(x)}</li>`).join("")}</ul></div></div>`;
 if(g.type==="hotspot") return `<div>${instr}${g.questions.map(q=>`<div class="mcq"><div class="qt"><span class="qnum">${q.id.replace(/\D/g,'')}</span>${esc(q.q)}</div><div style="text-align:center"><svg viewBox="${q.vb}" style="max-width:260px;border:1px solid var(--line);border-radius:10px">${q.bg}${q.spots.map(sp=>`<circle class="hspot ${ans[q.id]===sp.id?'sel':''}" cx="${sp.x}" cy="${sp.y}" r="11" id="hs${q.id}_${sp.id}" onclick="hsPick('${q.id}','${sp.id}')"/>`).join("")}</svg></div></div>`).join("")}</div>`;
 if(g.type==="dragdrop") return `<div>${instr}${g.questions.map(q=>`<div class="mcq"><div class="qt"><span class="qnum">${q.id.replace(/\D/g,'')}</span>${esc(q.q)}</div><div id="dd_${q.id}"></div></div>`).join("")}</div>`;
 return "";
}
function hsPick(qid,sp){ ans[qid]=sp; const part=parts[pi]; part.groups.forEach(g=>{if(g.type==="hotspot"){const q=g.questions.find(x=>x.id===qid); if(q)q.spots.forEach(s=>{const e=document.getElementById("hs"+qid+"_"+s.id); if(e)e.classList.toggle("sel",s.id===sp);});}}); }
function ddFind(qid){ let q=null; parts[pi].groups.forEach(g=>{if(g.type==="dragdrop"){const x=g.questions.find(z=>z.id===qid);if(x)q=x;}}); return q; }
function ddRender(qid){ const wrap=document.getElementById("dd_"+qid); const q=ddFind(qid); if(!wrap||!q)return; let placed=ans[qid]; if(!placed){placed=new Array(q.answer.length).fill(null);ans[qid]=placed;}
 const pool=q.tokens.filter(tk=>!placed.includes(tk));
 const slots=placed.map((tk,i)=>`<div class="ddslot ${tk?'filled':''}" onclick="${tk?`ddRemove('${qid}',${i})`:''}"><span class="ddn">${i+1}</span>${tk?esc(tk):'<span class="ddhint">tap a word below</span>'}</div>`).join("");
 const toks=pool.map(tk=>`<div class="ddtoken" onclick="ddPlace('${qid}',${q.tokens.indexOf(tk)})">${esc(tk)}</div>`).join("");
 wrap.innerHTML=`<div class="ddslots">${slots}</div><div class="ddpool">${toks}</div>`; }
function ddPlace(qid,idx){ const q=ddFind(qid); const placed=ans[qid]; const i=placed.indexOf(null); if(i>=0){placed[i]=q.tokens[idx]; ddRender(qid);} }
function ddRemove(qid,i){ const placed=ans[qid]; if(placed){placed[i]=null; ddRender(qid);} }
function calcHTML(){ const ks=["7","8","9","/","4","5","6","*","1","2","3","-","0",".","=","+"]; return `<button class="calcfab" onclick="calcToggle()">&#129518; Calculator</button><div class="calcpanel" id="calcpanel"><input id="calcdisp" readonly><div class="calcgrid">${ks.map(k=>`<button onclick="calcPress('${k}')">${k}</button>`).join("")}<button onclick="calcPress('C')">C</button><button onclick="calcPress('back')">&#9003;</button></div></div>`; }
function calcToggle(){ const p=document.getElementById("calcpanel"); if(p)p.classList.toggle("on"); }
function calcPress(k){ const d=document.getElementById("calcdisp"); if(!d)return; if(k==="C"){d.value="";return;} if(k==="back"){d.value=d.value.slice(0,-1);return;} if(k==="="){ try{const e=d.value.replace(/[^0-9.+\-*/() ]/g,""); d.value=String(Function("return ("+e+")")());}catch(_){d.value="Error";} return;} d.value+=k; }
function mcqHTML(q){ return `<div class="mcq"><div class="qt"><span class="qnum">${q.id.replace(/\D/g,'')}</span>${esc(q.q)}</div>${q.opts.map((o,j)=>`<label class="opt ${ans[q.id]===j?'sel':''}" id="op${q.id}_${j}" onclick="pick('${q.id}',${j})">${String.fromCharCode(65+j)}. ${esc(o)}</label>`).join("")}</div>`; }
function pick(id,j){ ans[id]=j; const part=parts[pi]; part.groups.forEach(g=>{ if(g.questions){const q=g.questions.find(x=>x.id===id); if(q)q.opts.forEach((o,k)=>{const e=document.getElementById("op"+id+"_"+k);if(e)e.classList.toggle("sel",k===j);});} }); }
function afterRender(part){ if(part.groups.some(g=>g.type==="extended")) setTimeout(wcount,40); part.groups.forEach(g=>{ if(g.type==="dragdrop")g.questions.forEach(q=>ddRender(q.id)); }); }
function wcount(){ const b=document.querySelector(".ta"); if(!b)return; const n=b.value.trim().split(/\s+/).filter(Boolean).length; const o=document.getElementById("wc"); if(o)o.textContent=n+" words"; }
function jump(idx){ if(idx!==pi){pi=idx;render();} }
function prev(){ if(pi>0){pi--;render();} }
function nextp(){ if(pi<parts.length-1){pi++;render();} else finish(); }

/* ===== scoring ===== */
function scoreSubject(s){ let c=0,t=0; s.parts.forEach((part,pidx)=>part.groups.forEach(g=>{
   if(g.type==="mcq"){g.questions.forEach(q=>{t++;if(ans[q.id]===q.ans)c++;});}
   else if(g.type==="fillin"){g.questions.forEach(q=>{t++;if(q.ans.some(a=>norm(a)===norm(ans[q.id])))c++;});}
   else if(g.type==="edit"){let bi=0;g.parts.forEach(p=>{if(p.sel){t++;if(ans["ed"+pidx+"_"+bi]==String(p.ans))c++;bi++;}});}
   else if(g.type==="hotspot"){g.questions.forEach(q=>{t++;if(ans[q.id]===q.ans)c++;});}
   else if(g.type==="dragdrop"){g.questions.forEach(q=>{t++;const pl=ans[q.id]||[];if(pl.length===q.answer.length&&pl.every((x,i)=>x===q.answer[i]))c++;});}
 })); return {c,t}; }
let PREM=false;
(function(){try{if(typeof fetch==="function")fetch("/api/account",{credentials:"include"}).then(function(r){return r.json();}).then(function(d){PREM=!!(d&&d.user&&(d.user.tips));}).catch(function(){});}catch(e){}})();
var GED_LESSONS={ rla:[["gd-read","Reading & evidence"],["gd-essay","The extended response"]], math:[["gd-math","Math reasoning"],["gd-algebra","Algebra & graphs"]], science:[["gd-sci","Science reasoning"]], social:[["gd-social","Social studies"]] };
var GED_EXP={ rla:"Answer from the passage evidence, not your opinion \u2014 find the line that proves the answer.", math:"Read carefully, note exactly what is asked, and use the calculator and formula sheet; watch wording and units.", science:"A reasoning test \u2014 draw your answer from the data, chart or passage given, not from memory.", social:"Reason from the source provided (document, map or chart), not from prior knowledge." };
function focusHTML(subj,pct){ var ls=GED_LESSONS[subj.key]||[]; if(!ls.length||pct>=0.85)return "";
 var rows=ls.map(function(l){ var cta=PREM?('<a class="btn teal" style="text-decoration:none;padding:7px 14px;font-size:13px" href="/app-lessons?exam=ged&node='+l[0]+'">Practice &rarr;</a>'):('<a class="btn ghost" style="text-decoration:none;padding:7px 14px;font-size:13px" href="/login?upgrade=1">Unlock in Premium</a>'); return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #e2e6ea"><div style="flex:1"><b>'+l[1]+'</b></div>'+cta+'</div>'; }).join("");
 return '<div style="margin-top:16px;text-align:left;border:1px solid #e2e6ea;border-radius:12px;padding:14px 16px"><div style="font-weight:800;color:#1a8f93;margin-bottom:6px">Focus areas \u2014 sharpen '+esc(subj.short)+' in the Lessons course</div>'+rows+'</div>';
}
function finish(){ if(timerInt)clearInterval(timerInt); mode="result";
 const s=scoreSubject(subj); const pct=s.t?s.c/s.t:0; const score=gedScore(pct); const band=gedBand(score);
 testEl().innerHTML=`<div class="center-wrap"><div class="brand"><span class="mk">A</span><span>Arian Academy</span></div>
   <h1 class="h1" style="margin-top:14px">${esc(subj.name)} — result</h1>
   <div class="bigscore" style="color:${band[1]}">${score}<span style="font-size:22px;color:#6b7785"> / 200</span></div>
   <div style="text-align:center"><span class="bandpill" style="background:${band[1]}1a;color:${band[1]}">${band[0]}</span></div>
   <p class="lead" style="text-align:center;margin-top:10px">${s.c} of ${s.t} auto-scored items correct. Pass mark is 145. The essay and short answers are not auto-scored - use the review to self-assess.</p>${focusHTML(subj,pct)}
   <div style="text-align:center;margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="btn teal" onclick="startReview()">Review answers</button><button class="btn" onclick="begin(subj.key)">Retake</button><button class="btn ghost" onclick="showHome()">Choose subject</button></div></div>`;
}

/* ===== review ===== */
let rItems=[],rIdx=0;
function startReview(){ rItems=[]; subj.parts.forEach((part,pidx)=>part.groups.forEach(g=>{
   if(g.type==="mcq")g.questions.forEach(q=>rItems.push({kind:"mcq",q,your:ans[q.id]}));
   else if(g.type==="fillin")g.questions.forEach(q=>rItems.push({kind:"fill",q,your:ans[q.id],ok:q.ans.some(a=>norm(a)===norm(ans[q.id])),correct:q.ans.join(" / ")}));
   else if(g.type==="edit"){let bi=0;g.parts.forEach(p=>{if(p.sel){const id="ed"+pidx+"_"+bi;rItems.push({kind:"edit",prompt:"Blank: choose the correct option",your:(ans[id]!=null&&ans[id]!=="")?p.sel[+ans[id]]:"(blank)",correct:p.sel[p.ans],ok:ans[id]==String(p.ans)});bi++;}});}
   else if(g.type==="hotspot")g.questions.forEach(q=>rItems.push({kind:"fill",q:{q:q.q},your:ans[q.id]||"(none)",correct:q.ans,ok:ans[q.id]===q.ans}));
   else if(g.type==="dragdrop")g.questions.forEach(q=>{const pl=ans[q.id]||[];const ok=pl.length===q.answer.length&&pl.every((x,i)=>x===q.answer[i]);rItems.push({kind:"fill",q:{q:q.q},your:(pl.filter(Boolean).join("  >  ")||"(none)"),correct:q.answer.join("  >  "),ok});});
   else if(g.type==="extended")rItems.push({kind:"open",prompt:g.instr,resp:ans["ext"+pidx],guide:g.guide});
 })); rIdx=0; renderReview(); }
function renderReview(){ window.scrollTo(0,0); mode="review"; const it=rItems[rIdx]; let body="";
 if(it.kind==="mcq"){ const st=it.your==null?'<div class="statusbar st-none">Not answered</div>':(it.your===it.q.ans?'<div class="statusbar st-ok">Correct</div>':'<div class="statusbar st-bad">Incorrect</div>'); body=st+`<div class="expcard"><p style="font-weight:600">${esc(it.q.q)}</p>${it.q.opts.map((o,j)=>`<div class="opt ${j===it.q.ans?'sel':''}">${String.fromCharCode(65+j)}. ${esc(o)} ${j===it.q.ans?'&#10003;':''}</div>`).join("")}</div>`; }
 else if(it.kind==="fill"||it.kind==="edit"){ const st=it.ok?'<div class="statusbar st-ok">Correct</div>':'<div class="statusbar st-bad">Incorrect</div>'; body=st+`<div class="expcard">${it.q?`<p style="font-weight:600">${esc(it.q.q)}</p>`:`<p>${esc(it.prompt)}</p>`}<p>Your answer: <b>${esc(it.your||"(blank)")}</b></p><p>Correct: <b>${esc(it.correct)}</b></p></div>`; }
 else { body=`<div class="statusbar st-none">Open response - self-assess</div><div class="expcard"><div class="h">Task</div><p style="white-space:pre-line">${esc(it.prompt)}</p>${it.resp?`<div class="h">Your response</div><p style="white-space:pre-wrap">${esc(it.resp)}</p>`:""}<div class="h">What a strong response includes</div><ul style="margin:0;padding-left:18px">${(it.guide||[]).map(g=>`<li>${esc(g)}</li>`).join("")}</ul></div>`; }
 if(it.kind!=="open"){ var _ge=(typeof GED_EXP!=="undefined"&&subj)?GED_EXP[subj.key]:""; if(_ge) body+=`<div class="expcard" style="margin-top:8px"><div class="h">Why</div><p>${esc(_ge)}</p></div>`; }
 var _gl=(typeof GED_LESSONS!=="undefined"&&subj)?((GED_LESSONS[subj.key]||[])[0]):null; if(_gl) body+=`<a style="display:inline-block;margin-top:8px;color:#1a8f93;font-weight:700;text-decoration:none;font-size:13px" href="/app-lessons?exam=ged&node=${_gl[0]}">Practice this skill \u2192</a>`;
 testEl().innerHTML=`<div class="center-wrap"><div class="brand"><span class="mk">A</span><span>Arian Academy</span></div><h1 class="h1" style="margin-top:12px">Review — ${rIdx+1} / ${rItems.length}</h1>${body}<div style="text-align:center;margin-top:18px;display:flex;gap:10px;justify-content:center"><button class="btn prev" onclick="rNav(-1)" ${rIdx===0?"disabled":""}>Previous</button><button class="btn teal" onclick="rNav(1)">${rIdx===rItems.length-1?"Finish":"Next"}</button><button class="btn ghost" onclick="finish()">Back to score</button></div></div>`;
}
function rNav(d){ if(d>0&&rIdx===rItems.length-1){finish();return;} rIdx=Math.max(0,Math.min(rItems.length-1,rIdx+d)); renderReview(); }

showHome();
</script>
<script>(function(){var b=document.getElementById("premBar");if(!b)return;try{fetch("/api/account",{credentials:"include"}).then(function(r){return r.json();}).then(function(d){if(!(d&&d.user&&(d.user.tips)))b.style.display="flex";}).catch(function(){});}catch(e){}})();</script>
