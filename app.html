<title>Daana — TOEFL iBT 2026 · IELTS & more coming</title>
<style>
:root{--ink:#28323b;--mut:#6b7785;--line:#dfe3e7;--teal:#1a8f93;--teald:#157074;--green:#16a06a;--greend:#0f8456;--yellow:#f7e9b8;--ybd:#ecd98c;--panel:#f5f7f8;--blue:#2b7cc9}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:#fff;line-height:1.5}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}
/* ---- generic centered screens (home, directions, results) ---- */
.center-wrap{max-width:860px;margin:0 auto;padding:36px 22px 70px}
.h1{font-size:30px;font-weight:800;margin:.2em 0}
.lead{color:var(--mut);font-size:15px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:22px}
.scard{border:1px solid var(--line);border-radius:14px;padding:22px 14px;text-align:center;background:#fff;display:flex;flex-direction:column;align-items:center;gap:8px}
.scard .ic{width:46px;height:46px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center;color:var(--teal)}
.scard .nm{font-weight:700}
.scard .mt{font-size:12px;color:var(--mut)}
.btn{background:var(--green);color:#fff;border:none;border-radius:24px;padding:11px 26px;font-weight:800;font-size:14px}
.btn:hover{background:var(--greend)}
.btn.teal{background:var(--teal)}.btn.teal:hover{background:var(--teald)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:8px}
.btn.ghost:hover{border-color:var(--teal)}
.dir-card{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:18px}
.dir-head{background:var(--teal);color:#fff;font-weight:800;padding:14px 20px;display:flex;align-items:center;gap:8px}
.dir-body{padding:20px}.dir-body p{margin:0 0 12px;color:#374550}
.banner-full{background:linear-gradient(180deg,#0e131b,#0e131b);}
/* ---- test chrome ---- */
#test{display:none;flex-direction:column;min-height:100vh}
#test.on{display:flex}
.thead{max-width:1180px;margin:0 auto;width:100%;padding:22px 28px 8px;display:flex;justify-content:space-between;align-items:flex-start}
.thead .sec{font-size:26px;font-weight:800}
.thead .sub{font-size:13px;color:var(--mut);margin-top:2px}
.thead .right{display:flex;align-items:center;gap:22px;font-weight:700}
.flag{display:flex;align-items:center;gap:6px;color:var(--mut);cursor:pointer}
.flag.on{color:#e07b39}
.clock{display:flex;align-items:center;gap:6px;color:var(--ink)}
.clock .ht{font-size:11px;color:var(--teal);cursor:pointer;font-weight:600}
.ibanner{background:var(--yellow);border-top:1px solid var(--ybd);border-bottom:1px solid var(--ybd);text-align:center;padding:15px;font-weight:700;color:#5b5530;font-size:17px;margin-top:8px}
.tbody{flex:1;max-width:1180px;margin:0 auto;width:100%;padding:26px 28px 30px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:34px}
.passcol{max-height:62vh;overflow:auto}
.qcol{}
.cloze-card,.center-card{max-width:760px;margin:0 auto;border:1px solid var(--line);border-radius:10px;padding:26px 30px}
.cloze{font-size:18px;line-height:2.3;color:#33424d}
.blank{display:inline-block;background:#d9dde1;border:none;border-radius:3px;height:22px;vertical-align:middle;font-size:15px;padding:0 4px;color:#28323b;outline:none}
.blank:focus{box-shadow:0 0 0 2px var(--teal)}
.email{border:2px solid var(--teal);border-radius:8px;overflow:hidden;max-width:520px;margin:0 auto;background:#fff}
.email-sub{display:flex;align-items:stretch;background:#cdeef0;border-bottom:2px solid var(--teal)}
.email-sub b{padding:10px 12px;border-right:2px solid var(--teal);white-space:nowrap}
.email-sub span{padding:10px 12px;background:#fff;flex:1;font-size:14px}
.email-body{padding:16px 18px;font-size:15px}
.email-body p{margin:0 0 10px}
.emailwrap .lbl{text-align:center;font-weight:800;font-size:18px;margin-bottom:14px;color:#3a4a55}
.passage-title{font-weight:800;font-size:19px;margin-bottom:4px}
.passage-text p{margin:0 0 12px;font-size:15.5px;color:#33424d}
.qtext{font-size:18px;color:#46555f;margin-bottom:16px;font-weight:600}
.opt{display:flex;gap:11px;align-items:flex-start;padding:10px 4px;cursor:pointer;border-radius:6px}
.opt:hover{background:#f3f6f7}
.opt input{margin-top:4px}
.navbar{background:#e9ecee;border-top:1px solid var(--line)}
.navin{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:16px 28px;gap:12px}
.navmid{color:#4a5762;font-weight:700}
.nav-r{display:flex;gap:10px}
.btn.prev{background:#fff;color:var(--teal);border:1px solid var(--teal);border-radius:24px;padding:10px 22px;font-weight:800}
.btn.end{background:#6b3fa0}.btn.end:hover{background:#582f87}
.btn.prev:disabled{opacity:.4;cursor:not-allowed}
.chip{display:inline-block;background:#eef1f3;border:1px solid var(--line);border-radius:8px;padding:8px 13px;margin:4px;cursor:pointer;font-size:15px}
.chip:hover{border-color:var(--teal)}.chip.used{opacity:.35;pointer-events:none}
.built{min-height:46px;border:1px dashed var(--line);border-radius:8px;padding:11px;font-size:16px;margin:8px 0}
.toolbar{display:flex;gap:6px;align-items:center;background:#eef1f3;border:1px solid var(--line);border-bottom:none;border-radius:8px 8px 0 0;padding:7px}
.toolbar .tb{background:#fff;border:1px solid var(--line);border-radius:5px;padding:4px 10px;font-size:12px}
.toolbar .wc{margin-left:auto;font-size:12px;color:var(--mut)}
textarea{width:100%;min-height:300px;border:1px solid var(--line);border-radius:0 0 8px 8px;padding:14px;font-size:15px;font-family:inherit;outline:none;resize:vertical}
textarea:focus{border-color:var(--teal)}
.tofrom{font-size:14px;color:#374550;margin-bottom:2px}
.bigtimer{font-size:54px;font-weight:800;color:var(--teal);text-align:center;font-variant-numeric:tabular-nums}
.note{background:#eef6f6;border:1px solid #cfe6e6;border-radius:8px;padding:10px 14px;font-size:13px;color:#3c5b5b;margin-bottom:14px}
.post{border-left:3px solid var(--line);padding:6px 0 6px 12px;margin:8px 0}.post b{color:var(--teal)}
.scoregrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}
.scell{background:var(--panel);border-radius:10px;padding:16px;text-align:center}
.scell .n{font-size:26px;font-weight:800;color:var(--teal)}
.brand{display:flex;align-items:center;gap:9px;font-weight:800}
.mk{width:30px;height:30px;border:1.5px solid var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--teal);font-weight:800}
.spanel{border:1px solid var(--line);border-radius:10px;padding:16px;min-height:300px;display:flex;flex-direction:column}
.sprow{display:flex;justify-content:space-between;color:var(--mut);font-size:13px}
.sprow .link{color:var(--mut)}
.avs{flex:1;display:flex;align-items:center;justify-content:center;gap:22px;padding:16px 0}
.av{width:110px;height:150px;border-radius:12px;background:#eaeff1;display:flex;align-items:center;justify-content:center;font-size:60px}
.audiostate{text-align:center;color:var(--mut);font-weight:700;padding:9px;background:#eef1f3;border-radius:20px}
.agtab{width:100%;border-collapse:collapse}.agtab td{border:1px solid var(--line);padding:8px 10px;font-size:14px}.agtab td:first-child{font-weight:700;white-space:nowrap;width:96px}
.statusbar{padding:12px 16px;border-radius:8px;font-weight:700;margin-bottom:14px}
.st-ok{background:#dff3e6;color:#1a7a4f}
.st-bad{background:#fbe3e3;color:#a32d2d}
.st-none{background:#f3e6c6;color:#7a5b16}
.opt.rev-correct{background:#eafaf0;border:1px solid var(--green);border-radius:6px}
.opt.rev-wrong{background:#fdeeee;border:1px solid #e2a5a5;border-radius:6px}
.expcard{margin-top:18px;border:1px solid var(--line);border-radius:10px;padding:16px 18px}
.expcard .h{font-weight:800;color:var(--teal);margin-bottom:8px}
.expcard p{margin:0 0 8px}
.progress{height:5px;background:#e3e7ea}
.progress>i{display:block;height:100%;background:var(--teal);transition:width .25s}
.navov{position:fixed;inset:0;background:rgba(20,30,40,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.navpanel{background:#fff;border-radius:14px;max-width:560px;width:100%;padding:22px;max-height:80vh;overflow:auto}
.navgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:8px;margin:14px 0}
.ncell{height:44px;border-radius:8px;border:1px solid var(--line);background:#fff;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ncell:hover{border-color:var(--teal)}
.ncell.done{background:#e6f4ef;border-color:var(--green);color:#157a4f}
.ncell.flag{background:#fdf3d0;border-color:#e0b94a;color:#8a6a16}
.ncell.cur{outline:2px solid var(--teal);outline-offset:-2px}
.leg{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--mut)}
.leg b{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-1px;margin-right:4px}
.gauge{height:16px;border-radius:8px;background:linear-gradient(90deg,#e26b6b,#e8c15a,#5ec08a);position:relative;margin:12px auto;max-width:360px}
.gauge .mk{position:absolute;top:-6px;width:4px;height:28px;background:#11161f;border-radius:2px;transform:translateX(-2px)}
.sbar{height:8px;background:#e3e7ea;border-radius:5px;overflow:hidden;margin-top:6px}.sbar>i{display:block;height:100%;background:var(--teal)}
.fab{position:fixed;right:18px;bottom:18px;z-index:40;background:var(--teal);color:#fff;border:none;border-radius:24px;padding:10px 16px;font-weight:800;box-shadow:0 4px 14px rgba(0,0,0,.15);cursor:pointer}
.notespanel{position:fixed;right:18px;bottom:64px;z-index:40;width:280px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.16);padding:12px;display:none}
.notespanel.on{display:block}.notespanel textarea{min-height:160px}
.homestat{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin:14px 0;color:var(--mut);font-size:13px}
.homestat b{color:var(--ink)}
.scard .desc{font-size:11px;color:var(--mut);line-height:1.35;min-height:30px}
@media(max-width:760px){.center-wrap{padding:24px 15px 60px}.h1{font-size:23px}.cards{grid-template-columns:1fr 1fr;gap:10px}.scard{padding:16px 10px}.scard .desc{min-height:0}.thead{flex-wrap:wrap;padding:14px 15px 6px;gap:8px}.thead .sec{font-size:20px}.thead .right{gap:14px;font-size:13px}.ibanner{font-size:14px;padding:11px}.tbody{padding:16px 14px 26px}.split{grid-template-columns:1fr;gap:18px}.passcol{max-height:none}.cloze-card,.center-card{padding:18px 15px}.cloze{font-size:16px;line-height:2.05}.qtext{font-size:16px}.email{max-width:100%}.navin{padding:12px 14px;gap:8px}.navmid{font-size:12px}.btn{padding:10px 18px}.btn.prev{padding:9px 16px}.bigtimer{font-size:42px}.avs{gap:12px}.av{width:84px;height:116px;font-size:46px}.spanel{min-height:220px}textarea{min-height:220px}.scoregrid{grid-template-columns:1fr}.navgrid{grid-template-columns:repeat(auto-fill,minmax(40px,1fr))}.fab{right:12px;bottom:12px;padding:9px 13px}.notespanel{width:calc(100vw - 24px);right:12px}.homestat{gap:12px;font-size:12px}.agtab td{font-size:13px;padding:7px 8px}.agtab td:first-child{width:80px}}
.tasktimer{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:18px;color:var(--teal);font-variant-numeric:tabular-nums;background:#eef6f6;border:1px solid #cfe6e6;border-radius:20px;padding:6px 14px;margin-bottom:12px}
.tasktimer.low{color:#c2410c;background:#fff3e9;border-color:#f3cba3}
.tasktimer.up{color:#a32d2d;background:#fbe3e3;border-color:#eebcbc}
#premBar{display:none;position:sticky;top:0;z-index:300;align-items:center;gap:10px;justify-content:center;flex-wrap:wrap;background:linear-gradient(90deg,#0f6b6f,#157a7e);color:#fff;padding:9px 14px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:13px;font-weight:600;line-height:1.35}
#premBar a{background:#9af6e4;color:#04201c;font-weight:800;padding:6px 13px;border-radius:8px;text-decoration:none;font-size:12.5px}
#premBar .x{background:none;border:none;color:#bfe7e2;font-size:15px;cursor:pointer;line-height:1}
</style>
</head>

const TEST1 = {
 reading:{ name:"Reading", minutes:27, instrDir:"Reading has three task types: Complete the Words, Read in Daily Life, and Read an Academic Text. This section is adaptive - how you do in the first module sets the difficulty of the second. You may use Next and Previous within the section; your notes are not scored.",
  tasks:[
   {type:"cloze", instr:"Fill in the missing letters in the paragraph.", parts:[
     CL("On a summer night, a city can be several degrees war"),BK("war","mer"),CL(" than the farmland around it. Scientists call this the urban heat is"),BK("is","land"),CL(" effect. Hard surfaces like asphalt and con"),BK("con","crete"),CL(" absorb heat in the day and rele"),BK("rele","ase"),CL(" it slowly at ni"),BK("ni","ght"),CL(". Planting trees and painting roofs white can red"),BK("red","uce"),CL(" the warmth and make cities more liv"),BK("liv","able"),CL(".") ]},

   {type:"email", instr:"Choose the option that best answers the question.", source:{subject:"Fitness class", body:["Dear Mr. Garcia,","There has been a change in the fitness class that you registered for at HealthHub Gym. The beginners’ weight-training class will still meet on Monday and Wednesday, but not on Friday. We will adjust your automatic payments accordingly.","Regards,","Laura Bennett"]},
     qs:[ {q:"What is the class about?",opts:["Weight-training for beginners","Advanced aerobics","Riding stationary bikes","Breathing exercises"],a:0,exp:"The email names the class directly as the beginners' weight-training class, so A is correct. Aerobics, stationary bikes, and breathing exercises are never mentioned."},
          {q:"On what day will the class no longer meet?",opts:["Monday","Tuesday","Wednesday","Friday"],a:3,exp:"The email says the class will still meet Monday and Wednesday but not on Friday, so D (Friday) is the day it stops."} ]},
   {type:"email", instr:"Choose the option that best answers the question.", source:{subject:"Upcoming enhancements to project management software", body:["Dear Mr. Tanaka,","I hope this message finds you well. I’m writing to inform you of upcoming updates to our project management software, scheduled to go live next Thursday. These enhancements are designed to improve user experience.","Key improvements include: customizable dashboards for personalized project views; a redesigned, more intuitive interface for easier navigation; and new collaboration tools, including real-time editing and integrated messaging to support teamwork.","Please note that a scheduled system downtime will occur from 2:00 a.m. to 4:00 a.m. (local time) on Thursday to implement these changes. We recommend informing your team and adjusting any time-sensitive activities accordingly.","Regards,","Lisa Chen"]},
     qs:[ {q:"What is the main focus of the software updates?",opts:["Expanding the number of projects the software can manage","Analyzing how teams work together","Increasing the software’s speed","Making the software easier for individuals to use"],a:3,exp:"The email says the changes are designed to improve user experience, and the examples center on ease of use, so D. Speed and project capacity are not claimed, and analyzing teamwork is only one feature."},
          {q:"It can be inferred that the current software lacks which of the following?",opts:["The ability to track tasks team members perform","The ability for team members to contact one another within the same system","A user interface for navigation","A way to inform users of tasks"],a:1,exp:"New integrated messaging is listed as an improvement, which implies users currently cannot message each other inside the system, so B. Task tracking and a navigation interface already exist."},

     {who:"Martin Blake",time:"9:12 A.M.",text:"Hey everyone! The final exam is coming up soon for our cultural anthropology class. What do you all think of forming a study group?"},

function premWall(title){ if(window.speechSynthesis)speechSynthesis.cancel(); mode="prem"; setFab(false); homeEl().style.display="none"; testEl().classList.add("on");
 testEl().innerHTML='<div class="center-wrap"><div class="brand"><svg viewBox="0 0 1517 805" role="img" aria-label="Daana" style="height:24px;width:auto;display:block"><use href="#daanaWM"/></svg></div>'

  +'<div style="text-align:center;margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><a class="btn teal" style="text-decoration:none" href="/login?upgrade=1">Upgrade to Premium</a><button class="btn ghost" onclick="showHome()">Back</button></div></div>';
}
function showTips(){ if(!PREM){premWall("Tips &amp; Strategy");return;} if(window.speechSynthesis)speechSynthesis.cancel(); mode="tips"; setFab(false); homeEl().style.display="none"; testEl().classList.add("on");
 testEl().innerHTML=`<div class="center-wrap"><div class="brand"><svg viewBox="0 0 1517 805" role="img" aria-label="Daana" style="height:24px;width:auto;display:block"><use href="#daanaWM"/></svg></div>
   <h1 class="h1" style="margin-top:16px">Tips &amp; Strategy</h1>
   <p class="lead">General strategies for the 2026 TOEFL iBT. Per-question explanations are added as each test's content is built.</p>
   ${TIPS.map(b=>`<div class="dir-card" style="margin-top:16px"><div class="dir-head">${b.h}</div><div class="dir-body"><ul style="margin:0;padding-left:18px">${b.items.map(i=>`<li style="margin-bottom:8px">${i}</li>`).join("")}</ul></div></div>`).join("")}
   <div style="text-align:center;margin-top:20px"><button class="btn teal" onclick="showHome()">Back to start</button></div></div>`;
}

function begin(f){flow=f;secIdx=0;ans={};flags={};bsPick={};taskTimeLeft={};testStartedAt=Date.now();directions();}
function directions(){
 const sec=DATA[flow[secIdx]];
 homeEl().style.display="none"; testEl().classList.add("on");
 testEl().innerHTML=`<div class="center-wrap"><div class="dir-card">
   <div class="dir-head">${sec.name} — Test Directions</div>
   <div class="dir-body"><p>${esc(sec.instrDir)}</p><p style="color:#6b7785;font-size:13px">Time: about ${sec.minutes} minutes.</p></div>
 </div><div style="text-align:center;margin-top:20px"><button class="btn teal" onclick="runSection()">Start</button></div></div>`;
}
function runSection(){ buildScreens(DATA[flow[secIdx]]); si=0; secTimer=DATA[flow[secIdx]].minutes*60; startTimer(); render(); }
function startTimer(){ if(timerInt)clearInterval(timerInt); timerInt=setInterval(()=>{secTimer--; const t=document.getElementById("clk"); if(t&&!hideTime)t.textContent=fmt(Math.max(0,secTimer)); if(secTimer<=0){clearInterval(timerInt);finishSection();}},1000); }

function buildScreens(sec){
 screens=[]; const T=sec.tasks.length;
 sec.tasks.forEach((task,ti)=>{
   if(task.type==="cloze"){ const n=task.parts.filter(p=>p.ans).length; screens.push({sec,task,ti,T,label:`Questions 1–${n} for Task ${ti+1} of ${T}`}); }
   else if(task.type==="email"||task.type==="chat"||task.type==="passage"||task.type==="agenda"){ task.qs.forEach((q,qi)=>screens.push({sec,task,ti,T,qi,label:`Question ${qi+1} for Task ${ti+1} of ${T}`})); }
   else if(task.type==="lchoose"){ screens.push({sec,task,ti,T,label:`Task ${ti+1} of ${T}`}); }
   else if(task.type==="lconv"||task.type==="lannounce"||task.type==="ltalk"){ task.qs.forEach((q,qi)=>screens.push({sec,task,ti,T,qi,label:`Question ${qi+1} for Task ${ti+1} of ${T}`})); }
   else if(task.type==="build"){ task.items.forEach((it,qi)=>screens.push({sec,task,ti,T,qi,label:`Question ${qi+1} for Task ${ti+1} of ${T}`})); }
   else { screens.push({sec,task,ti,T,label:`Task ${ti+1} of ${T}`}); }
 });
}

/* ---------- render shell ---------- */
function render(){
 window.scrollTo(0,0); mode="run"; setFab(true);
 const sc=screens[si]; const sec=sc.sec;
 const flagged=flags[si]?"on":""; const noBack=(flow[secIdx]==="listening"||flow[secIdx]==="speaking");
 testEl().innerHTML=`
  <div class="thead"><div><div class="sec">${sec.name}</div><div class="sub">Arian Academy · practice question</div></div>
   <div class="right">
     <div class="flag ${flagged}" onclick="toggleFlag()">&#9873; Flag</div>
     <div class="clock">&#9201; <span id="clk">${hideTime?"":fmt(Math.max(0,secTimer))}</span> <span class="ht" onclick="toggleHide()">${hideTime?"Show Time":"Hide Time"}</span></div>
   </div></div>
  <div class="progress"><i style="width:${Math.round((si+1)/screens.length*100)}%"></i></div>
  <div class="ibanner">${esc(sc.task.instr)}</div>
  <div class="tbody">${body(sc)}</div>
  <div class="navbar"><div class="navin">
     <button class="btn ghost" onclick="reviewSection()">Review Section</button>
     <div class="navmid">${sc.label}</div>
     <div class="nav-r"><button class="btn prev" onclick="prev()" ${(si===0||noBack)?"disabled":""}>Previous</button>
       <button class="btn ${(si===screens.length-1 && secIdx!==flow.length-1)?'end':''}" onclick="next()">${si!==screens.length-1?"Next":(secIdx===flow.length-1?"Submit":"End Section")}</button></div>
  </div></div>`;
 if(sc.task.type==="build") renderBuild();
 if(["lchoose","lconv","lannounce","ltalk"].includes(sc.task.type)) setTimeout(()=>playListen(sc),350);
 clearTaskTimer();
 if(sc.task.type==="email_write"||sc.task.type==="discussion") startTaskTimer(sc);
}
function toggleFlag(){flags[si]=!flags[si];document.querySelector(".flag").classList.toggle("on");}
function toggleHide(){hideTime=!hideTime;render();}
function answeredState(i){ const sc=screens[i],t=sc.task,sk=flow[secIdx];
 if(t.type==="cloze"){ let any=false,bi=0; t.parts.forEach(p=>{if(p.ans){if((ans[sk+"-"+sc.ti+"-b"+bi]||"")!=="")any=true; bi++;}}); return any; }
 if(["email","agenda","chat","passage","lconv","lannounce","ltalk"].includes(t.type)) return ans[sk+"-"+sc.ti+"-"+sc.qi]!=null;
 if(t.type==="lchoose") return ans[sk+"-"+sc.ti+"-0"]!=null;
 if(t.type==="build") return (bsPick[sc.qi]||[]).length>0;
 if(t.type==="email_write") return !!ans["w-email"]; if(t.type==="discussion") return !!ans["w-disc"];
 return false; }
function reviewSection(){ const cells=screens.map((sc,i)=>{ let cls="ncell"; if(i===si)cls+=" cur"; if(flags[i])cls+=" flag"; else if(answeredState(i))cls+=" done"; return `<div class="${cls}" onclick="jumpTo(${i})">${i+1}</div>`; }).join("");
 const ov=document.createElement("div"); ov.className="navov"; ov.id="navov"; ov.onclick=(e)=>{if(e.target===ov)closeNav();};
 ov.innerHTML=`<div class="navpanel"><div style="display:flex;justify-content:space-between;align-items:center"><h2 style="margin:0;font-size:18px">Review — ${DATA[flow[secIdx]].name}</h2><button class="btn ghost" onclick="closeNav()">Close</button></div><div class="navgrid">${cells}</div><div class="leg"><span><b style="background:#e6f4ef;border:1px solid var(--green)"></b>Answered</span><span><b style="background:#fdf3d0;border:1px solid #e0b94a"></b>Flagged</span><span><b style="background:#fff;border:1px solid var(--line)"></b>Not answered</span></div></div>`;
 document.body.appendChild(ov); }
function closeNav(){ const o=document.getElementById("navov"); if(o)o.remove(); }
function jumpTo(i){ closeNav(); si=i; render(); }

/* ---------- bodies ---------- */
function body(sc){
 const t=sc.task;
 if(t.type==="cloze") return clozeBody(sc);
 if(t.type==="email") return `<div class="split"><div class="passcol"><div class="emailwrap"><div class="lbl">Read an email.</div>${emailHTML(t.source)}</div></div><div class="qcol">${qBlock(sc)}</div></div>`;
 if(t.type==="agenda") return `<div class="split"><div class="passcol"><div class="emailwrap"><div class="lbl">Read an agenda.</div>${agendaHTML(t.source)}</div></div><div class="qcol">${qBlock(sc)}</div></div>`;
 if(t.type==="passage") return `<div class="split"><div class="passcol"><div class="passage-title">${esc(t.source.title)}</div><div class="passage-text">${t.source.paras.map(p=>`<p>${esc(p)}</p>`).join("")}</div></div><div class="qcol">${qBlock(sc)}</div></div>`;
 if(t.type==="chat") return `<div class="split"><div class="passcol"><div class="emailwrap"><div class="lbl">Read a text chain.</div>${chatHTML(t.msgs)}</div></div><div class="qcol">${qBlock(sc)}</div></div>`;
 if(t.type==="lchoose"||t.type==="lconv"||t.type==="lannounce"||t.type==="ltalk") return listenBody(sc);
 if(t.type==="build") return `<div class="center-card"><p class="lead">Tap the words in order. Tap the line to clear it.</p><div id="buildwrap"></div></div>`;
 if(t.type==="email_write") return emailWriteBody(t);
 if(t.type==="discussion") return discussionBody(t);
 if(t.type==="repeat") return repeatBody(t);
 if(t.type==="interview") return interviewBody(t);
 return "";
}
function emailHTML(s){return `<div class="email"><div class="email-sub"><b>Subject:</b><span>${esc(s.subject)}</span></div><div class="email-body">${s.body.map(p=>`<p>${esc(p)}</p>`).join("")}</div></div>`;}
function agendaHTML(s){return `<div class="email"><div class="email-sub"><b>Agenda</b><span>${esc(s.title)}</span></div><div class="email-body"><table class="agtab">${s.rows.map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td></tr>`).join("")}</table></div></div>`;}
function chatHTML(msgs){return `<div class="email" style="border-color:#caa84a"><div class="email-sub" style="background:#fbe7b0;border-color:#caa84a"><b style="border-color:#caa84a">&#128172; Live Chat</b><span style="background:#fbe7b0"></span></div><div class="email-body">${msgs.map(m=>`<p><b>${esc(m.who)} (${esc(m.time)})</b><br>${esc(m.text)}</p>`).join("")}</div></div>`;}
function secKeyQ(sc){return flow[secIdx]+"-"+sc.ti+"-"+(sc.qi||0);}
function qBlock(sc){ const t=sc.task; const q=t.qs?t.qs[sc.qi]:null; if(!q)return ""; const ins=q.kind==="insert"?`<div style="font-weight:700;margin:8px 0 4px">${esc(q.sentence)}</div>`:""; return `<div class="qtext">${esc(q.q)}</div>${ins}${optsHTML(secKeyQ(sc),q.opts)}`; }
function optsHTML(key,opts){ return opts.map((o,j)=>`<label class="opt" onclick="pick('${key}',${j})"><input type="radio" name="${key}" ${ans[key]===j?"checked":""}> <span>${esc(o)}</span></label>`).join(""); }
function pick(key,j){ans[key]=j;document.querySelectorAll(`input[name="${key}"]`).forEach((r,i)=>r.checked=(i===j));}
function listenBody(sc){ const t=sc.task; const right = t.type==="lchoose" ? optsHTML(secKeyQ(sc), t.opts) : `<div class="qtext">${esc(t.qs[sc.qi].q)}</div>${optsHTML(secKeyQ(sc), t.qs[sc.qi].opts)}`; return `<div class="split"><div>${speakerPanel(t.type==="lconv"?2:1)}</div><div class="qcol">${right}</div></div>`; }
function speakerPanel(n){ const av=n===2?'<div class="av">&#128104;</div><div class="av">&#128105;</div>':'<div class="av">&#128100;</div>'; return `<div class="spanel"><div class="sprow"><span>Volume &#128266;</span><span class="link">Trouble hearing/recording?</span></div><div class="avs">${av}</div><div class="audiostate" id="astate">Loading audio…</div></div>`; }
const AUDIO_BASE="audio/";
function playFileOrTTS(url,text,onStart,onDone){ let done=false; const fin=()=>{if(!done){done=true;onDone&&onDone();}};
 const a=new Audio(url); a.onplaying=()=>onStart&&onStart(); a.onended=fin;
 a.onerror=()=>{ if("speechSynthesis"in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=0.96;u.lang="en-US";u.onstart=()=>onStart&&onStart();u.onend=fin;window.speechSynthesis.speak(u);} else {onStart&&onStart();setTimeout(fin,1200);} };
 a.play().catch(()=>a.onerror()); return a; }
function playListen(sc){ const st=document.getElementById("astate"); if(!st)return; st.textContent="Audio Is Playing";
 playFileOrTTS(AUDIO_BASE+"listen-"+(sc.ti+1)+".mp3", sc.task.audio, ()=>{const e=document.getElementById("astate");if(e)e.textContent="Audio Is Playing";}, ()=>{const e=document.getElementById("astate");if(e)e.innerHTML='<button class="btn" onclick="replayListen()">&#9654; Replay</button>';}); }
function replayListen(){ playListen(screens[si]); }

function clozeBody(sc){ const t=sc.task; let bi=0; const html=t.parts.map(p=>{ if(p.ans){const id=flow[secIdx]+"-"+sc.ti+"-b"+(bi++); const w=Math.max(2,p.ans.length); return `${esc(p.pre)}<input class="blank" style="width:${w*0.75+1}em" id="${id}" value="${ans[id]?esc(ans[id]):""}" oninput="ans['${id}']=this.value">`;} return esc(p.t); }).join(""); return `<div class="cloze-card"><div class="cloze">${html}</div></div>`; }

/* writing: build a sentence */
let bsPick={};
function renderBuild(){ const sc=screens[si]; const it=sc.task.items[sc.qi]; const w=document.getElementById("buildwrap"); if(!w)return; const pk=bsPick[sc.qi]||[];
 w.innerHTML=`<div class="built" onclick="bsClear(${sc.qi})">${pk.length?esc(pk.join(" ")):"<span style='color:#9aa6b8'>tap words…</span>"}</div><div>${it.words.map(wd=>`<span class="chip ${pk.includes(wd)?"used":""}" onclick="bsAdd(${sc.qi},'${wd.replace(/'/g,"\\'")}')">${esc(wd)}</span>`).join("")}</div>`; }
function bsAdd(ii,wd){bsPick[ii]=bsPick[ii]||[];if(!bsPick[ii].includes(wd))bsPick[ii].push(wd);renderBuild();}
function bsClear(ii){bsPick[ii]=[];renderBuild();}

let taskTimeLeft={}, taskTimerInt=null;
function clearTaskTimer(){ if(taskTimerInt){clearInterval(taskTimerInt);taskTimerInt=null;} }
function startTaskTimer(sc){ clearTaskTimer(); const t=sc.task; const key=flow[secIdx]+"-"+sc.ti;
  if(taskTimeLeft[key]==null) taskTimeLeft[key]=(t.minutes||5)*60;
  const el=document.getElementById("ttimer"); const box=document.getElementById(t.type==="email_write"?"wbox":"dbox");
  function paint(){ if(!el)return; const x=Math.max(0,taskTimeLeft[key]); el.innerHTML="&#9201; "+fmt(x)+" left"; el.className="tasktimer"+(x<=60?" low":""); }
  paint();
  taskTimerInt=setInterval(()=>{ taskTimeLeft[key]--; paint();
    if(taskTimeLeft[key]<=0){ clearTaskTimer(); if(el){el.innerHTML="&#9201; Time\u2019s up \u2014 review or move on"; el.className="tasktimer up";}
      if(box){ box.setAttribute("readonly","readonly"); box.style.opacity=".65"; } } },1000);
}
function emailWriteBody(t){ return `<div class="split"><div class="passcol"><p style="font-weight:700">${esc(t.prompt)}</p><ul>${t.bullets.map(b=>`<li>${esc(b)}</li>`).join("")}</ul><p class="lead">${esc(t.close)}</p></div><div class="qcol"><div class="tasktimer" id="ttimer"></div><div class="tofrom"><b>To:</b> ${esc(t.to)}</div><div class="tofrom" style="margin-bottom:8px"><b>Subject:</b> ${esc(t.subject)}</div><div class="toolbar"><span class="tb">Cut</span><span class="tb">Paste</span><span class="tb">Undo</span><span class="tb">Redo</span><span class="wc" id="wc1">0 words</span></div><textarea id="wbox" placeholder="Write your email…" oninput="ans['w-email']=this.value;wcount('wbox','wc1')">${ans['w-email']?esc(ans['w-email']):""}</textarea></div></div>`; }
function discussionBody(t){ return `<div class="split"><div class="passcol"><p style="font-weight:700">${esc(t.professor)}</p>${t.posts.map(p=>`<div class="post"><b>${esc(p.who)}</b><div>${esc(p.text)}</div></div>`).join("")}<p class="lead">${esc(t.close)}</p></div><div class="qcol"><div class="tasktimer" id="ttimer"></div><div class="toolbar"><span class="tb">Cut</span><span class="tb">Paste</span><span class="tb">Undo</span><span class="tb">Redo</span><span class="wc" id="wc2">0 words</span></div><textarea id="dbox" placeholder="Write your response…" oninput="ans['w-disc']=this.value;wcount('dbox','wc2')">${ans['w-disc']?esc(ans['w-disc']):""}</textarea></div></div>`; }
function wcount(id,out){const b=document.getElementById(id);if(!b)return;const n=b.value.trim().split(/\s+/).filter(Boolean).length;const o=document.getElementById(out);if(o)o.textContent=n+" words";}

function spk(av,timerId,labelId,labelText,btnId,onclick){ return `<div class="split"><div><div class="spanel"><div class="sprow"><span>Volume &#128266;</span><span class="link">Trouble hearing/recording?</span></div><div class="avs"><div class="av">${av}</div></div><div class="audiostate" id="sstate">Ready</div></div></div><div class="qcol"><p style="font-weight:700">${labelText}</p><div style="text-align:center;padding:12px 0"><div class="bigtimer" id="${timerId}">--</div><div class="lead" id="${labelId}"></div></div><div style="text-align:center"><button class="btn teal" id="${btnId}" onclick="${onclick}">Begin</button></div></div></div>`; }
function repeatBody(t){ return spk("&#128104;","rclk","rlbl",esc(t.scenario),"rbtn","repeatRun()"); }
function interviewBody(t){ return spk("&#128105;","iclk","ilbl",esc(t.scenario),"ibtn","intRun()"); }
let rIdx=0;
function speakSeq(items,total,clkId,lblId,labelWord,recSec,btn,prefix){ let i=0; const clk=document.getElementById(clkId),lbl=document.getElementById(lblId);
 function go(){ const ss=document.getElementById("sstate"); if(!ss)return; lbl.textContent=`${labelWord} ${i+1} of ${total}`; ss.textContent="Audio Is Playing"; clk.textContent="--";
   function rec(){ const s2=document.getElementById("sstate"); if(s2)s2.innerHTML="&#128308; Recording…"; let left=(typeof recSec==="function"?recSec(items[i]):recSec); clk.textContent=left; const iv=setInterval(()=>{left--;clk.textContent=Math.max(0,left); if(left<=0){clearInterval(iv); i++; if(i<total) go(); else {const s3=document.getElementById("sstate"); if(s3)s3.textContent="Done"; clk.textContent="\u2713"; btn.disabled=false; btn.textContent="Finished";}}},1000); }
   playFileOrTTS(AUDIO_BASE+prefix+(i+1)+".mp3", items[i], ()=>{const s4=document.getElementById("sstate");if(s4)s4.textContent="Audio Is Playing";}, rec);
 } go();
}
function repeatRun(){ const t=screens[si].task; const btn=document.getElementById("rbtn"); btn.disabled=true; speakSeq(t.statements,t.statements.length,"rclk","rlbl","Statement",function(s){return Math.max(8,Math.min(22,Math.round(s.split(/\s+/).length*0.8)));},btn,"speak-repeat-"); }
let iIdx=0;
function intRun(){ const t=screens[si].task; const btn=document.getElementById("ibtn"); btn.disabled=true; speakSeq(t.qs,t.qs.length,"iclk","ilbl","Question",45,btn,"speak-interview-"); }

/* ---------- nav ---------- */
function prev(){ if(si>0){si--;render();} }
function next(){ if(window.speechSynthesis)speechSynthesis.cancel(); rIdx=0; iIdx=0;
 if(si<screens.length-1){si++;render();} else finishSection(); }
function finishSection(){ clearTaskTimer(); if(timerInt)clearInterval(timerInt); if(secIdx<flow.length-1){secIdx++;directions();} else results(); }

/* ---------- results ---------- */
function band(p){return (Math.round((1+p*5)*2)/2).toFixed(1);}
var SKILLMAP={"tf-main":"Main idea & purpose","tf-detail":"Reading for detail","tf-infer":"Inference","tf-vocab":"Vocabulary in context","tf-write":"Writing tasks"};
function skillOf(q,t){ var x=((q&&q.q)||"").toLowerCase();
 if(/main idea|mainly about|primarily|best title|purpose of the/.test(x))return "tf-main";
 if(/infer|imply|implies|suggest|most likely|conclude/.test(x))return "tf-infer";
 if(/closest in meaning|the word|the phrase|best replaced|\bmeans\b/.test(x))return "tf-vocab";
 if(t&&t.type==="cloze")return "tf-vocab";
 return "tf-detail";
}
function focusAreas(){ var miss={};
 if(flow.includes("reading")&&DATA.reading&&DATA.reading.tasks){ DATA.reading.tasks.forEach(function(t,ti){ if(t.qs){ t.qs.forEach(function(q,qi){ if(ans["reading-"+ti+"-"+qi]!==q.a){ var sk=skillOf(q,t); miss[sk]=(miss[sk]||0)+1; } }); } }); }
 if(flow.includes("writing")&&DATA.writing&&DATA.writing.tasks){ var bt=DATA.writing.tasks.find(function(t){return t.type==="build";}); if(bt){ bt.items.forEach(function(it,qi){ var built=(bsPick[qi]||[]).join(" ").replace(/\s+/g," ").trim(); if(built.toLowerCase()!==it.answer.toLowerCase()) miss["tf-write"]=(miss["tf-write"]||0)+1; }); } }
 var arr=Object.keys(miss).map(function(k){return {skill:k,title:SKILLMAP[k]||k,misses:miss[k]};}); arr.sort(function(a,b){return b.misses-a.misses;}); return arr.slice(0,3);
}
function focusHTML(){ var fa=focusAreas(); if(!fa.length)return "";
 var rows=fa.map(function(f){ var cta=PREM?('<a class="btn teal" style="text-decoration:none;padding:7px 14px;font-size:13px" href="/app-lessons?exam=toefl&node='+f.skill+'">Practice &rarr;</a>'):('<a class="btn ghost" style="text-decoration:none;padding:7px 14px;font-size:13px" href="/login?upgrade=1">Unlock in Premium</a>'); return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #e2e6ea"><div style="flex:1"><b>'+f.title+'</b> <span style="color:#6b7785;font-size:13px">&middot; '+f.misses+' missed</span></div>'+cta+'</div>'; }).join("");
 return '<div class="dir-card" style="margin-top:18px;text-align:left"><div class="dir-head">Your focus areas</div><div class="dir-body">Sharpen these in the Lessons course:'+rows+'</div></div>';
}
function results(){ if(window.speechSynthesis)speechSynthesis.cancel(); mode="result"; setFab(false);
 const did=k=>flow.includes(k);
 let rC=0,rT=0,lC=0,lT=0;
 if(did("reading")) DATA.reading.tasks.forEach((t,ti)=>{ if(t.type==="cloze"){let bi=0;t.parts.forEach(p=>{if(p.ans){const id="reading-"+ti+"-b"+(bi++);rT++;if((ans[id]||"").trim().toLowerCase()===p.ans.toLowerCase())rC++;}});} else if(t.qs){t.qs.forEach((q,qi)=>{rT++;if(ans["reading-"+ti+"-"+qi]===q.a)rC++;});} });
 if(did("listening")) DATA.listening.tasks.forEach((t,ti)=>{ if(t.type==="lchoose"){lT++;if(ans["listening-"+ti+"-0"]===t.a)lC++;} else if(t.qs){t.qs.forEach((q,qi)=>{lT++;if(ans["listening-"+ti+"-"+qi]===q.a)lC++;});} });
 const rP=rT?rC/rT:0,lP=lT?lC/lT:0; const bands=[]; if(did("reading"))bands.push(+band(rP)); if(did("listening"))bands.push(+band(lP));
 const overall=bands.length?(Math.round(bands.reduce((a,b)=>a+b,0)/bands.length*2)/2).toFixed(1):null;
 let cells="";
 if(did("reading"))cells+=`<div class="scell"><div class="lead">Reading</div><div class="n">${band(rP)}</div><div class="sbar"><i style="width:${Math.round(rP*100)}%"></i></div><div class="lead" style="font-size:12px;margin-top:4px">${rC}/${rT} · ~${Math.round(rP*30)}/30</div></div>`;
 if(did("listening"))cells+=`<div class="scell"><div class="lead">Listening</div><div class="n">${band(lP)}</div><div class="sbar"><i style="width:${Math.round(lP*100)}%"></i></div><div class="lead" style="font-size:12px;margin-top:4px">${lC}/${lT} · ~${Math.round(lP*30)}/30</div></div>`;
 if(did("writing")){ let bc=0,bt=0; const bteu=DATA.writing.tasks.find(t=>t.type==="build"); if(bteu){bt=bteu.items.length; bteu.items.forEach((it,qi)=>{const built=(bsPick[qi]||[]).join(" ").replace(/\s+/g," ").trim(); if(built.toLowerCase()===it.answer.toLowerCase())bc++;});} cells+=`<div class="scell"><div class="lead">Writing</div><div class="n">&#9999;</div><div class="lead" style="font-size:12px">Build ${bc}/${bt} · email & discussion: review</div></div>`; }
 if(did("speaking"))cells+=`<div class="scell"><div class="lead">Speaking</div><div class="n">&#127908;</div><div class="lead" style="font-size:12px">completed · review</div></div>`;
 testEl().innerHTML=`<div class="center-wrap"><div class="brand"><span class="mk">A</span><span>Arian Academy</span></div>
   <h1 class="h1" style="margin-top:16px">Your result</h1>
   ${overall?`<div style="text-align:center"><div class="bigtimer" style="font-size:56px">${overall}<span style="font-size:20px;color:#6b7785"> / 6.0</span></div><div class="lead">estimated band · CEFR ${cefr(overall)} · ~${Math.round((overall-1)/5*120)}/120</div><div class="gauge"><div class="mk" style="left:${Math.round((overall-1)/5*100)}%"></div></div></div>`:""}
   <div class="homestat"><span>Time: <b>${testStartedAt?fmt(Math.round((Date.now()-testStartedAt)/1000)):"—"}</b></span><span>Sections: <b>${flow.length}</b></span></div>
   <div class="scoregrid">${cells}</div>${focusHTML()}
   <p class="lead" style="margin-top:16px">Reading & Listening are auto-scored to the 2026 band (with a 0–120 estimate). Writing & Speaking need a teacher to rate — use the review to self-assess.</p>
   ${SCOPE==="reading"?`<div style="margin-top:18px;padding:16px;border:1px solid rgba(47,205,184,.4);border-radius:14px;background:rgba(47,205,184,.08);text-align:center"><div style="font-weight:800;color:#baf3e8">That's your free Reading sample done</div><p class="lead" style="margin:6px 0 12px">Unlock all four sections, 5 full tests, per-question explanations and the lessons course.</p><a class="btn teal" style="text-decoration:none" href="/login?upgrade=course">Unlock the full course</a></div>`:""}
   <div style="text-align:center;margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="btn teal" onclick="startReview()">Review answers &amp; explanations</button><button class="btn ghost" onclick="showTips()">Tips</button><button class="btn ghost" onclick="begin(flow)">Retake</button><button class="btn ghost" onclick="showHome()">Home</button></div></div>`;
}
let reviewItems=[], reviewIdx=0;
function collectReview(){ const out=[];
 if(flow.includes("reading")) DATA.reading.tasks.forEach((t,ti)=>{ if(t.type==="cloze"){ let bi=0; const blanks=t.parts.filter(p=>p.ans).map(p=>({pre:p.pre,ans:p.ans,id:"reading-"+ti+"-b"+(bi++)})); out.push({sec:"Reading",kind:"cloze",ti,blanks}); } else if(t.qs){ t.qs.forEach((q,qi)=>out.push({sec:"Reading",kind:"mcq",q,key:"reading-"+ti+"-"+qi})); } });
 if(flow.includes("listening")) DATA.listening.tasks.forEach((t,ti)=>{ if(t.type==="lchoose") out.push({sec:"Listening",kind:"mcq",q:{q:"Listen and choose the best response.",opts:t.opts,a:t.a,exp:t.exp},key:"listening-"+ti+"-0"}); else if(t.qs) t.qs.forEach((q,qi)=>out.push({sec:"Listening",kind:"mcq",q,key:"listening-"+ti+"-"+qi})); });
 if(flow.includes("writing")) DATA.writing.tasks.forEach((t,ti)=>{ if(t.type==="build") t.items.forEach((it,qi)=>out.push({sec:"Writing",kind:"build",qi,answer:it.answer}));
   else if(t.type==="email_write") out.push({sec:"Writing",kind:"open",title:"Write an Email",prompt:t.prompt,respKey:"w-email",guide:["Addresses all bullet points in the task","Has a greeting and a polite sign-off","100–150 words, complete sentences","Clear, organized, and natural English"]});
   else if(t.type==="discussion") out.push({sec:"Writing",kind:"open",title:"Write for an Academic Discussion",prompt:t.professor,respKey:"w-disc",guide:["States a clear opinion","Gives at least one reason and one specific example","Responds to or builds on a classmate's point","100–130 words; varied, natural sentences"]}); });
 if(flow.includes("speaking")) DATA.speaking.tasks.forEach((t,ti)=>{ if(t.type==="repeat") out.push({sec:"Speaking",kind:"open",title:"Listen and Repeat",prompt:t.scenario,statements:t.statements,guide:["Repeat each statement exactly and clearly","Don't pause for long — you get one chance","Match the speaker's rhythm and key words"]});
   else if(t.type==="interview") t.qs.forEach((q,qi)=>out.push({sec:"Speaking",kind:"open",title:"Interview — Question "+(qi+1),prompt:q,guide:["Start with a direct answer","Add one reason (because…)","Add one specific example (for example…)","Speak the full 45 seconds with few fillers"]})); });
 return out; }
function startReview(){ if(!PREM){premWall("Answers &amp; explanations");return;} reviewItems=collectReview(); if(!reviewItems.length){alert("No items to review in this run.");return;} reviewIdx=0; renderReview(); }
function renderReview(){ window.scrollTo(0,0); mode="review"; setFab(false); const it=reviewItems[reviewIdx]; let status="", main="";
 if(it.kind==="mcq"){ const q=it.q,your=ans[it.key],a=q.a;
   status = your==null?'<div class="statusbar st-none">You did not answer this question</div>':(your===a?'<div class="statusbar st-ok">Correct</div>':'<div class="statusbar st-bad">Incorrect</div>');
   const opts=q.opts.map((o,j)=>{let cls="opt";if(j===a)cls+=" rev-correct";if(your===j&&j!==a)cls+=" rev-wrong";const mk=j===a?' <b style="color:var(--green)">&#10003;</b>':((your===j&&j!==a)?' <b style="color:#c0392b">&#10007;</b>':'');return `<div class="${cls}">${esc(o)}${mk}</div>`;}).join("");
   const exp=q.exp||`The correct answer is "${esc(q.opts[a])}." A full explanation will be added as each test's content is built out.`;
   main=`<div class="qtext">${esc(q.q)}</div>${opts}<div class="expcard"><div class="h">Text explanation</div><p>${exp}</p><a style="display:inline-block;margin-top:8px;color:#1a8f93;font-weight:700;text-decoration:none;font-size:13px" href="/app-lessons?exam=toefl&node=${skillOf(q,null)}">Practice this skill →</a></div>`;
 } else if(it.kind==="build"){ const your=(bsPick[it.qi]||[]).join(" ").trim(); const ok=your.toLowerCase()===it.answer.toLowerCase();
   status = !your?'<div class="statusbar st-none">Not attempted</div>':(ok?'<div class="statusbar st-ok">Correct</div>':'<div class="statusbar st-bad">Incorrect</div>');
   main=`<div class="qtext">Build a Sentence</div><div class="expcard"><div class="h">Your answer</div><p>${your?esc(your):"(not attempted)"}</p><div class="h">Correct sentence</div><p>${esc(it.answer)}</p></div>`;
 } else if(it.kind==="cloze"){ let correct=0; const rows=it.blanks.map(b=>{ const your=(ans[b.id]||"").trim(); const ok=your.toLowerCase()===b.ans.toLowerCase(); if(ok)correct++; return `<div class="opt ${ok?"rev-correct":"rev-wrong"}">${esc(b.pre)}<b>${esc(b.ans)}</b> &mdash; you wrote: ${your?esc(your):"(blank)"} ${ok?'<b style="color:var(--green)">&#10003;</b>':'<b style="color:#c0392b">&#10007;</b>'}</div>`; }).join(""); const total=it.blanks.length; status=`<div class="statusbar ${correct===total?"st-ok":(correct?"st-bad":"st-none")}">Complete the Words &mdash; ${correct} / ${total} correct</div>`; main=`<div class="qtext">Complete the Words</div>${rows}<div class="expcard"><div class="h">How to do these</div><p>Read the whole sentence first, then use grammar and the letters shown to finish each word. The full word is the shown letters plus your answer.</p></div>`; } else { const resp=it.respKey?ans[it.respKey]:null;
   status='<div class="statusbar st-none">Open response — self-assess using the guide below</div>';
   main=`<div class="qtext">${esc(it.title)}</div><div class="expcard"><div class="h">Prompt</div><p>${esc(it.prompt)}</p>${it.statements?('<div class="h">Statements</div>'+it.statements.map(x=>`<p>&bull; ${esc(x)}</p>`).join("")):""}${resp?('<div class="h">Your response</div><p style="white-space:pre-wrap">'+esc(resp)+'</p>'):""}<div class="h">What a strong response includes</div><ul style="margin:0;padding-left:18px">${it.guide.map(g=>`<li style="margin-bottom:6px">${esc(g)}</li>`).join("")}</ul></div>`;
 }
 testEl().innerHTML=`<div class="thead"><div><div class="sec">${it.sec}</div><div class="sub">Answer review &amp; explanation</div></div></div>
   <div class="ibanner">Review</div>
   <div class="tbody">${status}${main}</div>
   <div class="navbar"><div class="navin"><button class="btn ghost" onclick="results()">Back to results</button>
     <div class="navmid">Item ${reviewIdx+1} of ${reviewItems.length}</div>
     <div class="nav-r"><button class="btn prev" onclick="reviewNav(-1)" ${reviewIdx===0?"disabled":""}>Previous</button>
       <button class="btn next" onclick="reviewNav(1)" ${reviewIdx===reviewItems.length-1?"disabled":""}>Next</button></div></div></div>`;
}
function reviewNav(d){ reviewIdx=Math.min(reviewItems.length-1,Math.max(0,reviewIdx+d)); renderReview(); }
function setFab(on){ const f=document.getElementById("nfab"); if(f)f.style.display=on?"block":"none"; if(!on){ const p=document.getElementById("npanel"); if(p)p.classList.remove("on"); } }
function toggleNotes(){ const p=document.getElementById("npanel"); if(p)p.classList.toggle("on"); }
function cefr(b){ b=parseFloat(b)||0; return b>=5.5?"C1+":b>=4.5?"B2":b>=3.5?"B1":b>=2.5?"A2":"A1"; }
document.addEventListener("keydown",function(e){ if(mode!=="run")return; var tag=((e.target&&e.target.tagName)||"").toLowerCase(); if(tag==="input"||tag==="textarea")return; if(e.key==="ArrowRight"){e.preventDefault();next();} else if(e.key==="ArrowLeft"){e.preventDefault();prev();} });
showHome();
</script>
