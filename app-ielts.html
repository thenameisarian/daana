<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>Daana — IELTS Academic (computer-delivered) · by Arian Academy</title>
<style>
:root{--ink:#28323b;--mut:#6b7785;--line:#dfe3e7;--teal:#1a8f93;--teald:#157074;--green:#16a06a;--greend:#0f8456;--yellow:#fdf3d0;--ybd:#e0b94a;--panel:#f5f7f8;--red:#c0392b}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:#fff;line-height:1.5}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}
.center-wrap{max-width:880px;margin:0 auto;padding:34px 20px 70px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800}
.mk{width:30px;height:30px;border:1.5px solid var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--teal);font-weight:800}
.h1{font-size:28px;font-weight:800;margin:.3em 0}
.lead{color:var(--mut);font-size:15px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px}
.scard{border:1px solid var(--line);border-radius:14px;padding:18px 12px;text-align:center;background:#fff}
.scard .nm{font-weight:800}.scard .mt{font-size:12px;color:var(--mut)}
.btn{background:var(--green);color:#fff;border:none;border-radius:24px;padding:11px 24px;font-weight:800;font-size:14px}
.btn:hover{background:var(--greend)}.btn.teal{background:var(--teal)}.btn.teal:hover{background:var(--teald)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:8px}
.btn.prev{background:#fff;color:var(--teal);border:1px solid var(--teal);border-radius:24px;padding:10px 20px;font-weight:800}
.btn.prev:disabled{opacity:.4;cursor:not-allowed}
.dir-card{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:18px}
.dir-head{background:var(--teal);color:#fff;font-weight:800;padding:14px 20px}
.dir-body{padding:20px}.dir-body p{margin:0 0 12px;color:#374550}
#test{display:none;flex-direction:column;min-height:100vh}#test.on{display:flex}
.thead{max-width:1080px;margin:0 auto;width:100%;padding:18px 24px 6px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.thead .sec{font-size:22px;font-weight:800}.thead .sub{font-size:12px;color:var(--mut)}
.clock{display:flex;align-items:center;gap:6px;font-weight:800}
.clock .ht{font-size:11px;color:var(--teal);cursor:pointer}
.progress{height:5px;background:#e3e7ea}.progress>i{display:block;height:100%;background:var(--teal);transition:width .25s}
.ibanner{background:var(--yellow);border-top:1px solid var(--ybd);border-bottom:1px solid var(--ybd);text-align:center;padding:10px;font-weight:700;color:#7a5b16;font-size:14px}
.tbody{flex:1;max-width:1080px;margin:0 auto;width:100%;padding:22px 24px 30px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:30px}
.passcol{max-height:64vh;overflow:auto;padding-right:6px}
.passage-title{font-weight:800;font-size:19px;margin-bottom:6px}
.passage-text p{margin:0 0 12px;font-size:15px;color:#33424d}
.spanel{border:1px solid var(--line);border-radius:10px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px;background:var(--panel)}
.av{width:90px;height:90px;border-radius:50%;background:#eaeff1;display:flex;align-items:center;justify-content:center;font-size:42px}
.audiostate{color:var(--mut);font-weight:700;background:#eef1f3;border-radius:20px;padding:8px 16px}
.qgroup{margin-bottom:22px}
.qinstr{font-weight:700;font-size:14px;background:#eef6f6;border:1px solid #cfe6e6;border-radius:8px;padding:9px 12px;margin-bottom:12px;color:#2c5b5b}
.formtab{width:100%;border-collapse:collapse}.formtab td{padding:7px 8px;border-bottom:1px solid var(--line);font-size:15px;vertical-align:top}.formtab td:first-child{font-weight:700;white-space:nowrap;color:#3a4a55;width:38%}
.gapline{font-size:15px;margin:0 0 12px;color:#33424d;line-height:2}
.gap{display:inline-flex;align-items:center;gap:6px;font-weight:800;color:var(--teal)}
.gap input{width:8em;border:none;border-bottom:2px solid var(--teal);background:#f3fbfa;font-size:15px;padding:3px 5px;outline:none;font-family:inherit}
.gap input:focus{background:#e6f7f4}
.qnum{display:inline-flex;width:24px;height:24px;border-radius:50%;background:var(--teal);color:#fff;font-size:12px;font-weight:800;align-items:center;justify-content:center;vertical-align:middle}
.mcq{margin:0 0 16px}.mcq .qt{font-weight:600;margin-bottom:7px}
.opt{display:flex;gap:10px;align-items:flex-start;padding:8px 6px;border-radius:6px;cursor:pointer}.opt:hover{background:#f3f6f7}
.matchrow{display:flex;align-items:center;gap:10px;margin-bottom:9px}.matchrow .lbl{flex:1;font-size:15px}
select.msel{border:1px solid var(--line);border-radius:7px;padding:7px 8px;font-size:14px;font-family:inherit;background:#fff}
.optbox{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:var(--panel);margin-bottom:12px}
.optbox b{color:var(--teal)}
.navbar{background:#e9ecee;border-top:1px solid var(--line)}
.navin{max-width:1080px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;gap:10px}
.palette{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.pcell{width:30px;height:30px;border-radius:7px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pcell.done{background:#e6f4ef;border-color:var(--green);color:#157a4f}.pcell.cur{outline:2px solid var(--teal);outline-offset:-2px}
.scoregrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}
.scell{background:var(--panel);border-radius:10px;padding:16px;text-align:center}.scell .n{font-size:30px;font-weight:800;color:var(--teal)}
.bigband{font-size:58px;font-weight:800;color:var(--teal);text-align:center;font-variant-numeric:tabular-nums}
.statusbar{padding:10px 14px;border-radius:8px;font-weight:700;margin-bottom:12px}
.st-ok{background:#dff3e6;color:#1a7a4f}.st-bad{background:#fbe3e3;color:#a32d2d}.st-none{background:#f3e6c6;color:#7a5b16}
.expcard{margin-top:14px;border:1px solid var(--line);border-radius:10px;padding:14px 16px}.expcard .h{font-weight:800;color:var(--teal);margin-bottom:6px}
.fab{position:fixed;right:16px;bottom:16px;z-index:40;background:var(--teal);color:#fff;border:none;border-radius:24px;padding:9px 15px;font-weight:800;box-shadow:0 4px 14px rgba(0,0,0,.15);display:none}
.notespanel{position:fixed;right:16px;bottom:60px;z-index:40;width:280px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.16);padding:12px;display:none}
.notespanel.on{display:block}.notespanel textarea{width:100%;min-height:150px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit}
@media(max-width:760px){.center-wrap{padding:22px 14px 60px}.cards{grid-template-columns:1fr 1fr}.split{grid-template-columns:1fr;gap:16px}.passcol{max-height:none}.thead .sec{font-size:19px}.tbody{padding:16px 14px 24px}.navin{padding:10px 14px}.formtab td:first-child{width:42%}}
</style>
</head>
<body>
<div id="home"></div>
<div id="test"></div>
<button class="fab" id="nfab" onclick="toggleNotes()">&#128221; Notes</button>
<div class="notespanel" id="npanel"><div style="font-weight:700;margin-bottom:6px">Your notes (not scored)</div><textarea id="nta" placeholder="Jot notes while you work…"></textarea></div>
<script>
/* ====== IELTS DATA (placeholder; replaced with full content) ====== */
const IELTS = {
 listening:{ name:"Listening", minutes:30,
  dir:"You will hear four recordings and answer 40 questions. Each recording plays once. Answer as you listen; spelling must be correct. On computer you get 2 minutes at the end to check your answers.",
  parts:[
   { n:1, context:"Part 1 - Questions 1 to 10. Sarah Hill phones Greenwood Holiday Park to book a family break.",
     audio:"Good morning, Greenwood Holiday Park. Hi, I would like to book a family break. Of course - can I take your name? Sarah Hill, that is H-I-L-L. Thank you, Mrs Hill. How many people? Two adults and three children. And what type of accommodation - we have tents, cabins and lodges. A lodge, please. Good choice. How many nights? Seven nights. And which month? In August, if it is available. August is fine. Do you need anything extra? Yes, could we have a cot for the baby? No problem, I will add a cot. Are you bringing any pets? Yes, we have a dog - is that allowed? Dogs are welcome in lodges. Would you like to book an activity? The children love water, so kayaking, please. Kayaking is booked. To confirm, we need a deposit of fifty pounds. That is fine, fifty pounds.",
     groups:[
       { type:"fill", layout:"form", instr:"Complete the form below. Write ONE WORD AND/OR A NUMBER for each answer.",
         title:"Greenwood Holiday Park - Booking",
         rows:[ ["Surname","{1}"], ["Number of adults","{2}"], ["Number of children","{3}"], ["Accommodation","a {4}"], ["Number of nights","{5}"], ["Month of stay","{6}"], ["Extra item needed","a {7}"], ["Pet","a {8}"], ["Activity booked","{9}"], ["Deposit","£{10}"] ],
         keys:{ "1":["Hill"], "2":["2","two"], "3":["3","three"], "4":["lodge"], "5":["7","seven"], "6":["August"], "7":["cot"], "8":["dog"], "9":["kayaking"], "10":["50","fifty"] } }
     ] },
   { n:2, context:"Part 2 - Questions 11 to 20. A guide gives a tour of Hillside Community Centre.",
     audio:"Welcome to Hillside Community Centre. The building has an interesting past - it was once a furniture factory, before the council bought it. Today the centre is funded mainly by donations from local businesses, not by membership fees. If you would like to join, the easiest way is to book a short tour first, and our staff will sign you up. Our café is open every single day, from eight in the morning. By far our most popular class is pottery - it fills up weeks in advance. Now, the layout, using the plan in front of you. As you come through the main entrance, reception is straight ahead of you. Turn left, and the first door is the library, a quiet room overlooking the street. Opposite the library, on the other side of the corridor, is the gym. If you walk to the far end, the children's room is in the far right corner, next to the back door. And the garden is reached through the café, on the south side of the building.",
     groups:[
       { type:"mcq", instr:"Choose the correct letter, A, B or C.", questions:[
         { id:"11", q:"The building was originally a", opts:["school","furniture factory","hospital"], ans:1 },
         { id:"12", q:"The centre is funded mainly by", opts:["the council","donations","membership fees"], ans:1 },
         { id:"13", q:"To join, new members should first", opts:["pay online","bring ID","book a tour"], ans:2 },
         { id:"14", q:"The café is open", opts:["every day","weekdays only","weekends only"], ans:0 },
         { id:"15", q:"The most popular class is", opts:["yoga","pottery","dance"], ans:1 } ] },
       { type:"map", instr:"Where is each place? Choose the correct letter, A to F, for questions 16 to 20.",
         options:[["A","front-left room (first door on the left)"],["B","front-right room (opposite the library)"],["C","straight ahead from the entrance"],["D","far-left corner"],["E","far-right corner, by the back door"],["F","south side, reached through the café"]],
         questions:[ {id:"16",prompt:"Reception",ans:"C"},{id:"17",prompt:"Library",ans:"A"},{id:"18",prompt:"Gym",ans:"B"},{id:"19",prompt:"Children's room",ans:"E"},{id:"20",prompt:"Garden",ans:"F"} ] }
     ] },
   { n:3, context:"Part 3 - Questions 21 to 30. Two students, Mark and Lena, plan a geography presentation on urban green spaces.",
     audio:"Mark: So, our presentation on urban green spaces. Let us go through the sections. Lena: The introduction is ready - I think we keep it as planned. Mark: Agreed, keep the introduction. Next, the history of parks. Lena: Honestly, that part is far too long. Let us make it shorter. Mark: Fine, we will cut the history down. Then the Singapore case study. Lena: That is our best section - keep it exactly as it is. Mark: Definitely keep Singapore. Now, the health benefits section. Lena: I am still not sure about that one - let us decide later. Mark: Okay, health benefits is undecided for now. And the conclusion. Lena: It repeats too much - we should make the conclusion shorter. Mark: Right, shorten the conclusion. One thing worrying me is that the whole thing is too long. Lena: We can fix that by cutting. For our data, instead of a textbook, let us use a government website - the figures are more reliable. Mark: Good idea, the government website. For visuals, a map or a graph? Lena: Photographs will have more impact than either. Mark: Photographs it is. Tutor: Remember to cite all your sources clearly. And shall we meet again - Monday or Wednesday? Lena: Friday works better for both of us. Tutor: Friday then.",
     groups:[
       { type:"matching", instr:"What do the students decide about each section? Choose A, B or C for questions 21 to 25.",
         options:[["A","keep as planned"],["B","make it shorter"],["C","still undecided"]],
         questions:[ {id:"21",prompt:"Introduction",ans:"A"},{id:"22",prompt:"History of parks",ans:"B"},{id:"23",prompt:"Singapore case study",ans:"A"},{id:"24",prompt:"Health benefits",ans:"C"},{id:"25",prompt:"Conclusion",ans:"B"} ] },
       { type:"mcq", instr:"Choose the correct letter, A, B or C.", questions:[
         { id:"26", q:"Mark is worried that the presentation is", opts:["too long","too simple","too negative"], ans:0 },
         { id:"27", q:"For data, Lena suggests using", opts:["a textbook","a government website","a survey"], ans:1 },
         { id:"28", q:"They agree the best visual aid is", opts:["a map","a graph","photographs"], ans:2 },
         { id:"29", q:"The tutor reminds them to", opts:["cite sources","speak slowly","practise timing"], ans:0 },
         { id:"30", q:"They will next meet on", opts:["Monday","Wednesday","Friday"], ans:2 } ] }
     ] },
   { n:4, context:"Part 4 - Questions 31 to 40. A lecture on urban beekeeping.",
     audio:"Today we look at urban beekeeping - the practice of keeping bees in cities. It is growing fast. Surprisingly, city bees often produce more honey than rural bees, because parks and gardens give them a longer flowering season. The main threat to bees in the countryside is the heavy use of pesticides, which is lower in cities. A good urban hive should be placed on a flat roof, where it is safe and sunny. Beekeepers must always provide a nearby source of water, as bees need it to cool the hive. The insects can travel up to five kilometres to find food. One single hive may contain as many as fifty thousand bees. The most important bee for the colony is the queen, who lays all the eggs. Bees communicate the location of flowers through a special movement called a dance. Cities benefit too: more bees mean better pollination of urban fruit trees. Experts say the biggest barrier to urban beekeeping is not space but a lack of training.",
     groups:[
       { type:"fill", layout:"lines", instr:"Complete the notes below. Write ONE WORD ONLY for each answer.",
         lines:[
           "Urban beekeeping = keeping bees in {31}.",
           "City bees often make more {32} than rural bees.",
           "Longer flowering season comes from city parks and {33}.",
           "In the countryside, the main threat to bees is {34}.",
           "A hive should be placed on a flat {35}.",
           "Beekeepers must provide a source of {36} near the hive.",
           "Bees can travel up to {37} kilometres for food.",
           "One hive may hold about {38} thousand bees.",
           "The {39} is the only bee that lays eggs.",
           "Bees show where flowers are by doing a {40}." ],
         keys:{ "31":["cities","city"], "32":["honey"], "33":["gardens","garden"], "34":["pesticides","pesticide"], "35":["roof"], "36":["water"], "37":["5","five"], "38":["50","fifty"], "39":["queen"], "40":["dance"] } }
     ] }
  ] },
 reading:{ name:"Reading", minutes:60, dir:"Three passages, 40 questions, 60 minutes. No extra transfer time. (Content being added.)", parts:[] },
 writing:{ name:"Writing", minutes:60, dir:"Two tasks: Task 1 (describe visual data, ~150 words, 20 min) and Task 2 (essay, ~250 words, 40 min). (Content being added.)", parts:[] },
 speaking:{ name:"Speaking", minutes:14, dir:"Three parts: interview, cue-card long turn (1 min prep + up to 2 min), and discussion. (Content being added.)", parts:[] }
};

/* ====== raw-to-band tables (official) ====== */
function listeningBand(r){ const t=[[39,9],[37,8.5],[35,8],[32,7.5],[30,7],[26,6.5],[23,6],[18,5.5],[16,5],[13,4.5],[10,4],[8,3.5],[6,3],[4,2.5]]; for(const[m,b]of t)if(r>=m)return b; return r>=2?2:r>=1?1:0; }
function readingBandA(r){ const t=[[39,9],[37,8.5],[35,8],[33,7.5],[30,7],[27,6.5],[23,6],[19,5.5],[15,5],[13,4.5],[10,4],[8,3.5],[6,3]]; for(const[m,b]of t)if(r>=m)return b; return r>=1?2:0; }
function roundHalf(x){ return Math.round(x*2)/2; }
function bandWord(b){ return b>=8.5?"Expert / Very good":b>=7?"Good":b>=6?"Competent":b>=5?"Modest":b>=4?"Limited":"Basic"; }

/* ====== state ====== */
let flow=[], secIdx=0, parts=[], pi=0, ans={}, timerInt=null, secTimer=0, hideTime=false, mode="home", startedAt=0;
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt=s=>{const m=Math.floor(s/60),x=s%60;return m+":"+String(x).padStart(2,"0");};
function homeEl(){return document.getElementById("home");}
function testEl(){return document.getElementById("test");}
function setFab(on){const f=document.getElementById("nfab");if(f)f.style.display=on?"block":"none";if(!on){const p=document.getElementById("npanel");if(p)p.classList.remove("on");}}
function toggleNotes(){document.getElementById("npanel").classList.toggle("on");}

/* collect every question id in a section (for palette + scoring) */
function sectionQuestions(secKey){ const out=[]; (IELTS[secKey].parts||[]).forEach((part,partIdx)=>{ (part.groups||[]).forEach(g=>{ collectGroupIds(g).forEach(id=>out.push({id,partIdx,type:g.type})); }); }); return out; }
function collectGroupIds(g){ if(g.type==="fill"){ return Object.keys(g.keys); } if(g.type==="mcq"||g.type==="matching"||g.type==="map"){ return g.questions.map(q=>q.id); } return []; }

function tts(text){ if("speechSynthesis"in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=0.95;u.lang="en-GB";window.speechSynthesis.speak(u);} }

/* ====== home ====== */
function showHome(){
 if(timerInt)clearInterval(timerInt); if(window.speechSynthesis)speechSynthesis.cancel(); mode="home"; setFab(false);
 testEl().classList.remove("on"); testEl().innerHTML=""; homeEl().style.display="block";
 const desc={listening:"4 recordings, 40 questions.",reading:"3 passages, 40 questions.",writing:"Task 1 + Task 2.",speaking:"3 parts, 11–14 min."};
 homeEl().innerHTML=`<div class="center-wrap">
   <div class="brand"><span class="mk">D</span><span>Daana</span></div>
   <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.6;margin-top:4px">IELTS Academic · computer-delivered · by Arian Academy</div>
   <h1 class="h1" style="margin-top:12px">IELTS Academic — Practice Test</h1>
   <p class="lead">The computer-delivered format (the only IELTS format from June 2026). Band 0–9 scoring. Listening &amp; Reading auto-scored; Writing &amp; Speaking use guided self-review. Original practice material.</p>
   <div style="margin-top:8px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn teal" onclick="begin(['listening','reading','writing','speaking'])">Start Full Test</button></div>
   <p class="lead" style="margin-top:20px">Or practice one section:</p>
   <div class="cards">${["listening","reading","writing","speaking"].map(k=>`<div class="scard"><div class="nm">${IELTS[k].name}</div><div class="mt">${IELTS[k].minutes} min</div><div class="mt" style="margin:6px 0">${desc[k]}</div><button class="btn" style="padding:8px 18px" onclick="begin(['${k}'])">Start</button></div>`).join("")}</div>
 </div>`;
}

function begin(f){ flow=f.filter(k=>(IELTS[k].parts||[]).length); if(!flow.length){alert("That section's content is being added.");return;} secIdx=0; ans={}; startedAt=Date.now(); directions(); }
function directions(){ const sec=IELTS[flow[secIdx]]; homeEl().style.display="none"; testEl().classList.add("on");
 testEl().innerHTML=`<div class="center-wrap"><div class="dir-card"><div class="dir-head">${sec.name} — Directions</div><div class="dir-body"><p>${esc(sec.dir)}</p><p style="color:#6b7785;font-size:13px">Time: ${sec.minutes} minutes.</p></div></div><div style="text-align:center;margin-top:20px"><button class="btn teal" onclick="runSection()">Start ${esc(sec.name)}</button></div></div>`;
}
function runSection(){ parts=IELTS[flow[secIdx]].parts; pi=0; secTimer=IELTS[flow[secIdx]].minutes*60; startTimer(); render(); }
function startTimer(){ if(timerInt)clearInterval(timerInt); timerInt=setInterval(()=>{ secTimer--; const t=document.getElementById("clk"); if(t&&!hideTime)t.textContent=fmt(Math.max(0,secTimer)); if(secTimer<=0){clearInterval(timerInt);finishSection();} },1000); }
function toggleHide(){hideTime=!hideTime;render();}

/* ====== render a part ====== */
function render(){ window.scrollTo(0,0); mode="run"; setFab(true);
 const secKey=flow[secIdx]; const sec=IELTS[secKey]; const part=parts[pi];
 const qs=sectionQuestions(secKey); const answered=qs.filter(q=>ans[q.id]!=null&&ans[q.id]!=="").length;
 const isLast = pi===parts.length-1;
 const audioBlock = secKey==="listening" ? `<div class="spanel" style="margin-bottom:16px"><div class="av">&#127911;</div><div class="audiostate" id="astate">Loading audio…</div></div>` : "";
 const passageBlock = secKey==="reading" && part.passage ? `<div class="passcol"><div class="passage-title">${esc(part.passage.title)}</div><div class="passage-text">${part.passage.paras.map(p=>`<p>${esc(p)}</p>`).join("")}</div></div>` : "";
 const groupsHTML = (part.groups||[]).map(g=>renderGroup(g)).join("");
 const rightCol = `<div class="qcol">${groupsHTML}</div>`;
 const body = (secKey==="reading") ? `<div class="split">${passageBlock}${rightCol}</div>` : `${audioBlock}${rightCol}`;
 testEl().innerHTML=`
  <div class="thead"><div><div class="sec">${sec.name}</div><div class="sub">Part ${part.n} · Arian Academy practice</div></div>
   <div class="clock">&#9201; <span id="clk">${hideTime?"":fmt(Math.max(0,secTimer))}</span> <span class="ht" onclick="toggleHide()">${hideTime?"Show":"Hide"}</span></div></div>
  <div class="progress"><i style="width:${Math.round((pi+1)/parts.length*100)}%"></i></div>
  <div class="ibanner">${esc(part.context||part.head||("Part "+part.n))}</div>
  <div class="tbody">${body}</div>
  <div class="navbar"><div class="navin">
     <div class="palette">${qs.map(q=>`<div class="pcell ${q.partIdx===pi?'cur':''} ${(ans[q.id]!=null&&ans[q.id]!=='')?'done':''}" onclick="jumpToPart(${q.partIdx})">${q.id}</div>`).join("")}</div>
     <button class="btn prev" onclick="prevPart()" ${pi===0?"disabled":""}>Back</button>
     <button class="btn ${isLast?'teal':''}" onclick="nextPart()">${isLast?(secIdx===flow.length-1?"Submit":"End Section"):"Next"}</button>
  </div></div>`;
 if(secKey==="listening") setTimeout(()=>playPart(part),400);
 restoreInputs(part);
}
function restoreInputs(part){ (part.groups||[]).forEach(g=>{ if(g.type==="fill"){ Object.keys(g.keys).forEach(id=>{ const el=document.getElementById("q"+id); if(el&&ans[id]!=null)el.value=ans[id]; }); } }); }

/* ====== group renderers ====== */
function renderGroup(g){
 const instr=`<div class="qinstr">${esc(g.instr)}</div>`;
 if(g.type==="fill") return `<div class="qgroup">${instr}${fillHTML(g)}</div>`;
 if(g.type==="mcq") return `<div class="qgroup">${instr}${g.questions.map(mcqHTML).join("")}</div>`;
 if(g.type==="matching") return `<div class="qgroup">${instr}${optboxHTML(g.options)}${g.questions.map(q=>matchRow(q,g.options)).join("")}</div>`;
 if(g.type==="map") return `<div class="qgroup">${instr}${g.image?`<div style="text-align:center;margin:8px 0">${g.image}</div>`:""}${optboxHTML(g.options)}${g.questions.map(q=>matchRow(q,g.options)).join("")}</div>`;
 return "";
}
function gapInput(id){ return `<span class="gap"><span class="qnum">${id}</span><input id="q${id}" oninput="ans['${id}']=this.value.trim()" autocomplete="off"></span>`; }
function withGaps(tpl){ return esc(tpl).replace(/\{(\d+)\}/g,(m,id)=>gapInput(id)); }
function fillHTML(g){
 if(g.layout==="form"||g.layout==="table"){ const title=g.title?`<div style="font-weight:800;margin-bottom:8px">${esc(g.title)}</div>`:""; return `${title}<table class="formtab">${g.rows.map(r=>`<tr><td>${esc(r[0])}</td><td>${withGaps(r[1])}</td></tr>`).join("")}</table>`; }
 return `<div>${(g.lines||[]).map(l=>`<p class="gapline">${withGaps(l)}</p>`).join("")}</div>`;
}
function mcqHTML(q){ return `<div class="mcq"><div class="qt"><span class="qnum">${q.id}</span> ${esc(q.q)}</div>${q.opts.map((o,j)=>`<label class="opt" onclick="pickMcq('${q.id}',${j})"><input type="radio" name="m${q.id}" ${ans[q.id]===j?"checked":""}><span>${String.fromCharCode(65+j)}. ${esc(o)}</span></label>`).join("")}</div>`; }
function pickMcq(id,j){ ans[id]=j; document.querySelectorAll(`input[name="m${id}"]`).forEach((r,i)=>r.checked=(i===j)); markPalette(id); }
function optboxHTML(options){ return `<div class="optbox">${options.map(o=>`<div><b>${o[0]}</b> &nbsp;${esc(o[1])}</div>`).join("")}</div>`; }
function matchRow(q,options){ return `<div class="matchrow"><span class="qnum">${q.id}</span><span class="lbl">${esc(q.prompt)}</span><select class="msel" onchange="ans['${q.id}']=this.value;markPalette('${q.id}')"><option value="">—</option>${options.map(o=>`<option value="${o[0]}" ${ans[q.id]===o[0]?"selected":""}>${o[0]}</option>`).join("")}</select></div>`; }
function markPalette(id){ const cells=document.querySelectorAll(".pcell"); /* simple: re-render palette state */ }

/* ====== audio ====== */
const AUDIO_BASE="audio/ielts/";
function playPart(part){ const st=document.getElementById("astate"); if(!st)return; st.textContent="Audio is playing…";
 const a=new Audio(AUDIO_BASE+"listen-part-"+part.n+".mp3"); a.onended=()=>{const e=document.getElementById("astate");if(e)e.textContent="Audio finished";};
 a.onerror=()=>{ tts(part.audio||""); const e=document.getElementById("astate"); if(e)e.textContent="Audio is playing… (voice)"; if("speechSynthesis"in window){const iv=setInterval(()=>{if(!speechSynthesis.speaking){clearInterval(iv);const x=document.getElementById("astate");if(x)x.textContent="Audio finished";}},500);} };
 a.play().catch(()=>a.onerror()); }

/* ====== nav ====== */
function jumpToPart(idx){ if(idx!==pi){pi=idx;render();} }
function prevPart(){ if(pi>0){pi--;render();} }
function nextPart(){ if(window.speechSynthesis)speechSynthesis.cancel(); if(pi<parts.length-1){pi++;render();} else finishSection(); }
function finishSection(){ if(timerInt)clearInterval(timerInt); if(secIdx<flow.length-1){secIdx++;directions();} else results(); }

/* ====== scoring / results ====== */
function gradeFill(val,accepted){ const v=(val||"").trim().toLowerCase().replace(/\s+/g," "); return accepted.some(a=>a.toLowerCase()===v); }
function scoreSection(secKey){ let correct=0,total=0; (IELTS[secKey].parts||[]).forEach(part=>{ (part.groups||[]).forEach(g=>{
   if(g.type==="fill"){ Object.keys(g.keys).forEach(id=>{ total++; if(gradeFill(ans[id],g.keys[id]))correct++; }); }
   else if(g.type==="mcq"){ g.questions.forEach(q=>{ total++; if(ans[q.id]===q.ans)correct++; }); }
   else if(g.type==="matching"||g.type==="map"){ g.questions.forEach(q=>{ total++; if((ans[q.id]||"")===q.ans)correct++; }); }
 }); }); return {correct,total}; }
function results(){ if(window.speechSynthesis)speechSynthesis.cancel(); mode="result"; setFab(false);
 const bands=[]; let cells="";
 if(flow.includes("listening")){ const s=scoreSection("listening"); const b=listeningBand(s.correct); bands.push(b); cells+=scellHTML("Listening",b,`${s.correct}/${s.total} correct`); }
 if(flow.includes("reading")){ const s=scoreSection("reading"); const b=readingBandA(s.correct); bands.push(b); cells+=scellHTML("Reading",b,`${s.correct}/${s.total} correct`); }
 if(flow.includes("writing")) cells+=`<div class="scell"><div class="lead">Writing</div><div class="n">&#9999;</div><div class="lead" style="font-size:12px">self-review</div></div>`;
 if(flow.includes("speaking")) cells+=`<div class="scell"><div class="lead">Speaking</div><div class="n">&#127908;</div><div class="lead" style="font-size:12px">self-review</div></div>`;
 const overall=bands.length?roundHalf(bands.reduce((a,b)=>a+b,0)/bands.length):null;
 testEl().innerHTML=`<div class="center-wrap"><div class="brand"><span class="mk">A</span><span>Arian Academy</span></div>
   <h1 class="h1" style="margin-top:14px">Your IELTS result</h1>
   ${overall!=null?`<div style="text-align:center"><div class="bigband">${overall.toFixed(1)}<span style="font-size:20px;color:#6b7785"> / 9.0</span></div><div class="lead">overall band (auto-scored sections) · ${bandWord(overall)}</div></div>`:""}
   <div class="scoregrid">${cells}</div>
   <p class="lead" style="margin-top:14px">Listening &amp; Reading use the official raw-to-band conversion. Writing &amp; Speaking are rated by an examiner on four criteria — use the review to self-assess.</p>
   <div style="text-align:center;margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="btn teal" onclick="startReview()">Review answers</button><button class="btn ghost" onclick="begin(flow)">Retake</button><button class="btn ghost" onclick="showHome()">Home</button></div></div>`;
}
function scellHTML(name,band,sub){ return `<div class="scell"><div class="lead">${name}</div><div class="n">${band.toFixed(1)}</div><div class="lead" style="font-size:12px;margin-top:4px">${sub}</div></div>`; }

/* ====== review ====== */
let reviewItems=[],reviewIdx=0;
function startReview(){ reviewItems=[]; ["listening","reading"].forEach(secKey=>{ if(!flow.includes(secKey))return; (IELTS[secKey].parts||[]).forEach(part=>{ (part.groups||[]).forEach(g=>{
   if(g.type==="fill"){ Object.keys(g.keys).forEach(id=>reviewItems.push({sec:IELTS[secKey].name,id,your:ans[id],correct:g.keys[id].join(" / "),ok:gradeFill(ans[id],g.keys[id]),kind:"text"})); }
   else if(g.type==="mcq"){ g.questions.forEach(q=>reviewItems.push({sec:IELTS[secKey].name,id:q.id,your:ans[q.id]!=null?String.fromCharCode(65+ans[q.id]):null,correct:String.fromCharCode(65+q.ans),ok:ans[q.id]===q.ans,kind:"mcq",q})); }
   else if(g.type==="matching"||g.type==="map"){ g.questions.forEach(q=>reviewItems.push({sec:IELTS[secKey].name,id:q.id,your:ans[q.id]||null,correct:q.ans,ok:(ans[q.id]||"")===q.ans,kind:"match",prompt:q.prompt})); }
 }); }); }); if(!reviewItems.length){alert("Nothing to review.");return;} reviewIdx=0; renderReview(); }
function renderReview(){ window.scrollTo(0,0); mode="review"; setFab(false); const it=reviewItems[reviewIdx];
 const status= it.your==null?'<div class="statusbar st-none">Not answered</div>':(it.ok?'<div class="statusbar st-ok">Correct</div>':'<div class="statusbar st-bad">Incorrect</div>');
 let body=`<div class="expcard"><div class="h">Question ${it.id} · ${it.sec}</div>`;
 if(it.kind==="mcq"){ body+=`<p style="font-weight:600">${esc(it.q.q)}</p>`+it.q.opts.map((o,j)=>`<div class="opt ${j===it.q.ans?'st-ok':''}" style="border-radius:6px">${String.fromCharCode(65+j)}. ${esc(o)} ${j===it.q.ans?'&#10003;':''}</div>`).join(""); }
 else if(it.kind==="match"){ body+=`<p>${esc(it.prompt)}</p><p>Your answer: <b>${it.your||"(blank)"}</b> &middot; Correct: <b>${esc(it.correct)}</b></p>`; }
 else { body+=`<p>Your answer: <b>${it.your?esc(it.your):"(blank)"}</b></p><p>Accepted: <b>${esc(it.correct)}</b></p>`; }
 body+=`</div>`;
 testEl().innerHTML=`<div class="center-wrap"><div class="brand"><span class="mk">A</span><span>Arian Academy</span></div><h1 class="h1" style="margin-top:14px">Review — ${reviewIdx+1} / ${reviewItems.length}</h1>${status}${body}<div style="text-align:center;margin-top:18px;display:flex;gap:10px;justify-content:center"><button class="btn prev" onclick="reviewNav(-1)" ${reviewIdx===0?"disabled":""}>Previous</button><button class="btn teal" onclick="reviewNav(1)">${reviewIdx===reviewItems.length-1?"Finish":"Next"}</button><button class="btn ghost" onclick="results()">Back to result</button></div></div>`;
}
function reviewNav(d){ if(d>0&&reviewIdx===reviewItems.length-1){results();return;} reviewIdx=Math.max(0,Math.min(reviewItems.length-1,reviewIdx+d)); renderReview(); }

showHome();
</script>
</body>
</html>
