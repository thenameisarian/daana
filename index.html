<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>Daana — Sign in</title>
<style>
:root{--ink:#28323b;--mut:#6b7785;--line:#dfe3e7;--teal:#1a8f93;--teald:#137074;--panel:#f5f7f8;--green:#16a06a;--err:#d6584a}
*{box-sizing:border-box}html,body{margin:0;min-height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:radial-gradient(1100px 520px at 50% -10%,#eafbf8,#fff 60%);line-height:1.5;display:flex;align-items:center;justify-content:center;padding:28px 16px;min-height:100vh}
.wrap{max-width:420px;width:100%}
.brand{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:6px}
.mk{width:44px;height:44px;border:1.5px solid var(--teal);border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--teal);font-weight:800;font-size:26px}
.bn{font-weight:800;font-size:24px}
.tag{text-align:center;color:var(--mut);font-size:13.5px;margin:0 0 8px}
.count{text-align:center;font-size:12px;color:var(--teald);font-weight:700;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 12px 36px rgba(20,60,60,.08)}
.tabs{display:flex;gap:6px;background:var(--panel);border-radius:11px;padding:4px;margin-bottom:16px}
.tab{flex:1;border:none;background:transparent;color:var(--mut);font-weight:700;font-size:13.5px;padding:9px;border-radius:8px;cursor:pointer}
.tab.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.08)}
label{display:block;font-size:12px;font-weight:700;color:var(--mut);margin:0 0 5px}
input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:15px;font-family:inherit;margin-bottom:13px;outline:none}
input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(26,143,147,.12)}
.btn{width:100%;background:var(--teal);color:#fff;border:none;border-radius:11px;padding:13px;font-weight:800;font-size:15px;cursor:pointer}
.btn:hover{background:var(--teald)}.btn:disabled{opacity:.6}
.btn.alt{background:#fff;color:var(--ink);border:1px solid var(--line);margin-top:9px}
.msg{font-size:13px;margin:2px 0 12px;min-height:16px}
.msg.err{color:var(--err)}.msg.ok{color:var(--green)}
.hello{font-size:13px;color:var(--mut);text-align:center;margin-bottom:10px}
.hello b{color:var(--ink)}
.sep{display:flex;align-items:center;gap:10px;color:var(--mut);font-size:12px;margin:16px 0}
.sep::before,.sep::after{content:"";flex:1;height:1px;background:var(--line)}
.pay{border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:6px;background:var(--panel);font-size:13px;color:#3a4751}
.pay h4{margin:0 0 6px;font-size:13.5px}
.net{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.netb{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 10px;font-size:11.5px;font-weight:700;cursor:pointer;color:var(--mut)}
.netb.on{border-color:var(--teal);color:var(--teald)}
.addr{background:#fff;border:1px dashed var(--line);border-radius:8px;padding:9px;font-size:11.5px;word-break:break-all;font-family:ui-monospace,Menlo,monospace;margin:6px 0}
.copy{font-size:11px;color:var(--teald);font-weight:700;cursor:pointer;border:none;background:none;padding:0}
.lnk{display:inline-block;margin-top:8px;color:var(--teald);font-weight:700;text-decoration:none;font-size:13px}
.foot{text-align:center;margin-top:14px;font-size:12px;color:var(--mut)}
.foot a{color:var(--teald);text-decoration:none;cursor:pointer}
.center{text-align:center}
.spin{display:inline-block;width:15px;height:15px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="mk">د</span><span class="bn">Daana</span></div>
  <div class="tag">Your members-only exam-prep, by Arian Academy</div>
  <div class="count" id="count"></div>
  <div id="view"></div>
  <div class="foot" id="foot"></div>
</div>

<script>
const CONFIG={
 whatsapp:"https://whatsapp.com/channel/0029VbCe7n22v1J00hGDUW2J",
 instagram:"https://www.instagram.com/arianismyname/",
 pay:{ priceUsd:"15", nets:[
   {id:"trc20",name:"USDT · TRON (TRC20)",addr:"YOUR-TRC20-USDT-ADDRESS"},
   {id:"ton",name:"USDT · TON",addr:"YOUR-TON-USDT-ADDRESS"},
   {id:"bep20",name:"USDT · BSC (BEP20)",addr:"YOUR-BEP20-USDT-ADDRESS"}
 ]}
};
const TESTROUTE={toefl:"/app",ielts:"/app-ielts",duolingo:"/app-duolingo",ged:"/app-ged",all:"/hub"};
const view=document.getElementById("view"), foot=document.getElementById("foot");
const qs=new URLSearchParams(location.search);
let mode="login", payNet="trc20";
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* countdown to July 1, 2026 */
(function(){ const el=document.getElementById("count"); function t(){ const d=new Date(Date.UTC(2026,6,1,0,0,0))-Date.now(); if(d<=0){el.textContent="";return;} const days=Math.floor(d/86400000),h=Math.floor(d/3600000)%24; el.textContent="Full launch in "+days+"d "+h+"h"; } t(); setInterval(t,60000); })();

async function api(path,opts){ const r=await fetch(path,Object.assign({headers:{"content-type":"application/json"},credentials:"include"},opts)); let j={}; try{j=await r.json();}catch(e){} return {status:r.status,j}; }

function authView(){
 const needMsg = qs.get("need")==="login" ? "Please sign in to continue." : "";
 view.innerHTML=`<div class="card">
   <div class="tabs"><button class="tab ${mode==='login'?'on':''}" onclick="setMode('login')">Sign in</button><button class="tab ${mode==='register'?'on':''}" onclick="setMode('register')">Create account</button></div>
   <div class="msg ${needMsg?'err':''}" id="msg">${esc(needMsg)}</div>
   <label>Email</label><input id="email" type="email" autocomplete="email" placeholder="you@email.com">
   <label>Password</label><input id="pw" type="password" autocomplete="${mode==='register'?'new-password':'current-password'}" placeholder="${mode==='register'?'At least 8 characters':'Your password'}">
   <button class="btn" id="go" onclick="submitAuth()">${mode==='register'?'Create account':'Sign in'}</button>
 </div>`;
 foot.innerHTML = mode==='login'
   ? `New here? <a onclick="setMode('register')">Create an account</a>`
   : `Already have an account? <a onclick="setMode('login')">Sign in</a>`;
 const pw=document.getElementById("pw"); pw.addEventListener("keydown",e=>{if(e.key==="Enter")submitAuth();});
}
function setMode(m){ mode=m; authView(); }
function msg(t,cls){ const m=document.getElementById("msg"); if(m){m.textContent=t;m.className="msg "+(cls||"");} }

async function submitAuth(){
 const email=(document.getElementById("email").value||"").trim();
 const pw=document.getElementById("pw").value||"";
 if(!email||!pw){ msg("Enter your email and password.","err"); return; }
 if(mode==="register"&&pw.length<8){ msg("Password must be at least 8 characters.","err"); return; }
 const btn=document.getElementById("go"); btn.disabled=true; const lbl=btn.textContent; btn.innerHTML='<span class="spin"></span>';
 const path=mode==="register"?"/api/auth/register":"/api/auth/login";
 const r=await api(path,{method:"POST",body:JSON.stringify({email,password:pw})});
 btn.disabled=false; btn.textContent=lbl;
 if(r.j&&r.j.ok){ routeUser(r.j.user); }
 else { msg((r.j&&r.j.message)||"Something went wrong. Try again.","err"); }
}

function routeUser(user){
 if(user && user.access){ location.href = (user.tier==="premium"||user.access==="all") ? "/hub" : "/app-lessons"; return; }
 accessView(user);
}

function accessView(user){
 const wrong = qs.get("need")==="wrong";
 view.innerHTML=`<div class="card">
   <div class="hello">Signed in as <b>${esc(user&&user.email||"")}</b></div>
   <div class="center" style="font-weight:800;font-size:17px;margin-bottom:4px">Unlock your prep</div>
   <div class="msg" id="msg">${wrong?"<span class='err' style='color:var(--err)'>Your access doesn't cover that page.</span>":""}</div>
   <label>Access code (free for followers)</label>
   <input id="code" placeholder="DAANA-XXXX-XXXX" autocapitalize="characters">
   <button class="btn" id="rgo" onclick="submitCode()">Redeem code</button>
   <div class="sep">no code?</div>
   <button class="btn alt" onclick="togglePay()">Get Premium with crypto · $${esc(CONFIG.pay.priceUsd)}/mo</button>
   <div id="paybox"></div>
 </div>`;
 foot.innerHTML=`<a onclick="signOut()">Sign out</a> · <a href="${esc(CONFIG.whatsapp)}" target="_blank" rel="noopener">Get a code on WhatsApp</a>`;
 const code=document.getElementById("code"); code.addEventListener("keydown",e=>{if(e.key==="Enter")submitCode();});
}
async function submitCode(){
 const code=(document.getElementById("code").value||"").trim();
 if(!code){ msg("Enter your access code.","err"); return; }
 const btn=document.getElementById("rgo"); btn.disabled=true; const lbl=btn.textContent; btn.innerHTML='<span class="spin"></span>';
 const r=await api("/api/redeem",{method:"POST",body:JSON.stringify({code})});
 btn.disabled=false; btn.textContent=lbl;
 if(r.j&&r.j.ok){ msg("Unlocked! Taking you in…","ok"); setTimeout(()=>routeUser(r.j.user),500); }
 else { msg((r.j&&r.j.message)||"Could not redeem that code.","err"); }
}
function togglePay(){
 const box=document.getElementById("paybox");
 if(box.innerHTML){ box.innerHTML=""; return; }
 const n=CONFIG.pay.nets.find(x=>x.id===payNet)||CONFIG.pay.nets[0];
 box.innerHTML=`<div class="pay"><h4>Pay $${esc(CONFIG.pay.priceUsd)} in USDT</h4>
   <div class="net">${CONFIG.pay.nets.map(x=>`<button class="netb ${x.id===payNet?'on':''}" onclick="selNet('${x.id}')">${esc(x.name)}</button>`).join("")}</div>
   <div class="addr" id="addr">${esc(n.addr)}</div>
   <button class="copy" onclick="copyAddr()">Copy address</button>
   <div style="margin-top:9px">After paying, send your payment proof on WhatsApp and you'll get a premium code to redeem above.</div>
   <a class="lnk" href="${esc(CONFIG.whatsapp)}" target="_blank" rel="noopener">Send proof on WhatsApp →</a></div>`;
}
function selNet(id){ payNet=id; const box=document.getElementById("paybox"); box.innerHTML=""; togglePay(); }
function copyAddr(){ const a=document.getElementById("addr"); if(a&&navigator.clipboard){ navigator.clipboard.writeText(a.textContent).then(()=>{ const c=document.querySelector(".copy"); if(c){c.textContent="Copied!";setTimeout(()=>c.textContent="Copy address",1500);} }); } }
async function signOut(){ await api("/api/auth/logout",{method:"POST"}); location.href="/"; }

async function boot(){
 const r=await api("/api/account");
 if(r.j&&r.j.authed){ if(qs.get("upgrade")&&r.j.user){ accessView(r.j.user); } else if(r.j.user&&r.j.user.access){ routeUser(r.j.user); } else { accessView(r.j.user); } }
 else { authView(); }
}
boot();
</script>
</body>
</html>
